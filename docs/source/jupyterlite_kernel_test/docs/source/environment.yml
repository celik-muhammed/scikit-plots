---

# https://github.com/jupyterlite/sphinx-demo/blob/main/xeus-kernel-example/docs/source/environment.yml
# The name of the environment that is set up during the docs build process.
# This doesn't matter much, as the environment is not used for anything
# other than the installation of the packages that have been listed here.
# For examples, visit: https://github.com/jupyterlite/xeus-lite-demo#-how-to-install-kernels-and-packages
# ⚠️ CI NOTE (not enforced by this file): jupyterlite-xeus's own README pins
# `micromamba 2.0.5` for the pip install path ("you must install micromamba
# 2.0.5" — https://pypi.org/project/jupyterlite-xeus/). `micromamba create`
# is what actually consumes the channels/dependencies below
# (jupyterlite_xeus/create_conda_env.py), so installing "latest" micromamba
# in CI instead of 2.0.5 is a second, independent way this build can break
# even after the channels here are fixed. See the chat response for the
# pinned-install command.
name: jupyterlite-wasm-env

channels:
  # ── ACTIVE ── current canonical pair for the "jupyterlite-xeus" loader
  # (NOT the deprecated "jupyterlite-xeus-python"). This matches the
  # maintainers' own docs/environment-python.yml and the live
  # jupyterlite-xeus.readthedocs.io examples as of 2026-06.
  # Source: https://raw.githubusercontent.com/jupyterlite/xeus/refs/heads/main/docs/environment-python.yml
  - https://prefix.dev/emscripten-forge-4x
  - https://prefix.dev/conda-forge

  # ── DISABLED ── do not re-enable alongside the pair above.
  # `micromamba create --platform=emscripten-wasm32` (the platform
  # jupyterlite_xeus.create_conda_env hardcodes) solves across every
  # channel listed here. Mixing the "-4x" pair with these older/other
  # mirrors gives the solver multiple, non-interchangeable builds of the
  # same wasm32 packages (different xeus protocol/ABI generations) to
  # pick between, which is a common cause of `micromamba create` failing
  # outright, or "succeeding" with a kernel that won't load. Pick ONE
  # pair, not five.
  # - https://repo.prefix.dev/emscripten-forge-dev    # dev/staging mirror, not the stable -4x line
  # - https://repo.mamba.pm/emscripten-forge          # legacy mirror for the deprecated jupyterlite-xeus-python
  # - https://repo.prefix.dev/conda-forge
  # - conda-forge                                     # bare alias: mostly has no wasm32 builds, and
  #                                                   # duplicates prefix.dev/conda-forge above
  # - defaults
  # https://anaconda.org/channels/scikit-plots-wheels-staging-nightly
  # conda install scikit-plots-wheels-staging-nightly::<PACKAGE>
  # - scikit-plots-wheels-staging-nightly

# These dependencies are pre-installed in the environment and are loaded when the xeus-python
# kernel is instantiated when running a JupyterLite site.
# It is not possible to install these dependencies using pip.
dependencies:
  # While we include the Python kernel here, it is also possible to install other kernels
  # for other languages, such as JavaScript, R, Lua, and so on; see:
  # https://jupyterlite-xeus.readthedocs.io/en/stable/#xeus-kernels-in-jupyterlite
  - xeus-python
  - xeus-cpp
  - xeus-sqlite
  # - xeus-javascript
  # - xeus-lua
  - xeus-r
  # - r-ggplot2
  # - r-coursekata

  # - numpy
  # - scipy
  # - matplotlib
  # - pandas
  # - scikit-learn
  # - scikit-plots-wheels-staging-nightly::scikit-plots

  # Conda packages
  # - python=3.12  # modern jupyterlite-xeus, the Python version is no longer hidden in package code
  # - pip
  # pip dependencies from requirements.txt
  # - pip:
      # Use another requirements file.
      # Note that here also we can use relative paths.
      # pip will be run from the environment file directory, if provided.
      # - -r requirements.txt
      # You can also install a local Python package
      # - ..
