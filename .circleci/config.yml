  #           # Parse labels safely with jq; handle jq errors without failing
  #           RUN_CI=$(echo "$LABELS" | jq -r '.[].name' 2>/dev/null || echo "" | grep -q "run-ci" && echo "true" || echo "false")
  #           if [ "$RUN_CI" != "true" ]; then
