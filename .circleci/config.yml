  check-skip:
    description: Check if commit message contains skip keyword
    steps:
      - run:
          name: "🔍 Check skip"
          command: |
            set -Eeuo pipefail
            if [ ! -d "scikitplot" ]; then
              echo "Build was not run due to skip, exiting job ${CIRCLE_JOB} for PR ${CIRCLE_PULL_REQUEST}."
              # Exit early without error — skip the rest of the job if condition is met.
              circleci-agent step halt;
              # exit 1
            fi
            export GIT_LOG=$(git log --max-count=1 --pretty=format:"%B" | tr "\n" " ")
            echo "Got commit message:"
            echo "${GIT_LOG}"
            if [[ -v CIRCLE_PULL_REQUEST ]] && \
               ([[ "$GIT_LOG" == *"[skip circle]"* ]] || \
                [[ "$GIT_LOG" == *"[circle skip]"* ]] || \
                [[ "$GIT_LOG" == *"[lint only]"* ]] \
               ); then
              echo "Skip detected, exiting job ${CIRCLE_JOB} for PR ${CIRCLE_PULL_REQUEST}."
              # Exit early without error — skip the rest of the job if condition is met.
              circleci-agent step halt;
            fi
  merge:
    description: Merge with upstream
    steps:
      - run:
          name: "🔎 Merge with upstream"
          command: |
            echo $(git log -1 --pretty=%B)    | tee gitlog.txt

            echo ${CI_PULL_REQUEST//*pull\//} | tee merge.txt
            if [[ $(cat merge.txt) != "" ]]; then
              echo "Merging $(cat merge.txt)";
              if ! git remote -v | grep upstream; then
                git remote add upstream https://github.com/scikit-plots/scikit-plots.git;
              fi
              git pull --ff-only upstream "refs/pull/$(cat merge.txt)/merge";
              git fetch upstream main;
            fi
  submodules:
    description: update submodules
    steps:
      - run:
          name: update submodules
          command: |
            ## download submodules
            # git submodule init
            # git submodule update
            git submodule update --init --recursive || true
            # if ! git submodule update --init --recursive; then
            #   echo "WARNING: submodule update failed — build may be missing vendored content" >&2
            # fi
  apt-install:
    description: Install system dependencies
    steps:
      - run:
          name: "🛠️ Ensure CA certificates are installed and update apt sources to HTTP"
          command: |
            set -Eeuo pipefail
            # If id shows uid=1000(circleci) and ls -ld shows root root ownership without group-write, that's your answer.
            # default: uid=1001(circleci) gid=1002(circleci) groups=1002(circleci)
            id; ls -ld /usr/local/bin; df -h /usr/local/bin
            # Install CA certs to avoid SSL errors
            sudo apt-get update || true
            sudo apt-get install -y --fix-missing ca-certificates
            sudo update-ca-certificates
            # Replace HTTPS mirrors with HTTP to avoid cert errors in CI
            sudo sed -i 's|https://ftp.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list
            sudo sed -i 's|https://security.ubuntu.com/ubuntu|http://security.ubuntu.com/ubuntu|g' /etc/apt/sources.list
            # Clean apt cache and update package lists
            sudo apt-get clean
            sudo apt-get update --fix-missing -y
      - run:
          name: "📦 Install system dependencies"
          command: |
            set -Eeuo pipefail
            sudo apt-get install --fix-missing -y --no-install-recommends \
              build-essential \
              pkg-config \
              ninja-build \
              ccache \
              cm-super \
              graphviz \
              ffmpeg \
              inkscape \
              cmake \
              make \
              gfortran \
              libopenblas-dev \
              liblapack-dev \
              libgmp-dev \
              libmpfr-dev \
              tesseract-ocr
            # List installed packs:
            tesseract --list-langs  || true
            # Expected output should include:
            #   ara   (Arabic + Ottoman)
            #   deu   (German)
            #   ell   (Greek)
            #   eng   (English)
            #   heb   (Hebrew)
            #   tur   (Turkish)
            # Install missing packs (Debian/Ubuntu):
            sudo apt-get install --fix-missing -y --no-install-recommends \
              tesseract-ocr-deu \
              tesseract-ocr-ara \
              tesseract-ocr-heb \
              tesseract-ocr-tur \
              tesseract-ocr-ell
            # Alternatively use EasyOCR which handles multilingual without pack installs:
            # pip install easyocr
            # Then in reader_kwargs:
            #   "backend": "easyocr",
            #   "ocr_lang": "en"   # EasyOCR uses ISO 639-1; add "ar", "de" etc. as needed
  npm-install:
      description: 🧊 Install Node.js + npm (needed for jupyterlite_terminal @jupyterlite/cockle)
      steps:
        # Cache keyed on a checksum of the pinned version file:
        #   same pin   -> cache hit, no download
        #   pin bumped -> checksum changes -> cache miss -> fresh install
        - restore_cache:
            keys:
              - node-bin-v1-{{ checksum ".circleci/node-version.txt" }}
        - run:
            name: "🟩 Install Node.js + npm (skipped if cache hit)"
          # YAML multi-line scripts | block scalar instead of a > flow scalar
            command: |
              set -Eeuo pipefail
              export NODE_INSTALL_DIR="/home/circleci/.local/node"
              if [ -x "${NODE_INSTALL_DIR}/bin/node" ] && [ -x "${NODE_INSTALL_DIR}/bin/npm" ]; then
                # ls -la /home/circleci/.local/node/bin/npm
                # du -sh /home/circleci/.local/node/lib/node_modules/npm
                echo "node/npm restored from cache, skipping download."
              else
                NODE_VERSION="$(tail -1 .circleci/node-version.txt)"
                echo "Installing node v${NODE_VERSION}..."
                mkdir -p "${NODE_INSTALL_DIR}"
                # curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
                # sudo apt-get install -y nodejs npm # Debian's npm is often a stale/patched fork — nodejs That worked because NodeSource's nodejs package bundles npm in.
                # The official nodejs.org tarball bundles npm inside it — under lib/node_modules/npm, with bin/npm and bin/npx already present alongside bin/node in the same archive.
                # https://nodejs.org/dist/
                curl -fsSL --retry 3 --retry-delay 2 \
                  "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" \
                  | tar -xJf - \
                    --strip-components=1 \
                    -C "${NODE_INSTALL_DIR}"
              fi
              export PATH="${NODE_INSTALL_DIR}/bin:$PATH"
              echo "export PATH=\"${NODE_INSTALL_DIR}/bin:\$PATH\"" >> "$BASH_ENV"
              which node
              which npm
              # prints the full path of the npm that WILL run
              command -v npm
              node --version
              npm --version
              test -x "${NODE_INSTALL_DIR}/bin/node"
              test -x "${NODE_INSTALL_DIR}/bin/npm"
        - save_cache:
            key: node-bin-v1-{{ checksum ".circleci/node-version.txt" }}
            paths:
              - /home/circleci/.local/node
  micromamba-install:
    description: Install micromamba
    steps:
      # Cache keyed on a checksum of the pinned version file:
      #   same pin    -> cache hit, no download
      #   pin bumped  -> checksum changes -> cache miss -> fresh install,
      #                  saved under the new key
      - restore_cache:
          keys:
            - micromamba-bin-v1-{{ checksum ".circleci/micromamba-version.txt" }}
      - run:
          name: "🐍 Install micromamba (skipped if cache hit)"
          # YAML multi-line scripts | block scalar instead of a > flow scalar
          command: |
            set -Eeuo pipefail
            # export MICROMAMBA_BIN_DIR=/home/circleci/.local/bin
            # export MAMBA_ROOT_PREFIX=/home/circleci/micromamba
            if [ -x "${MICROMAMBA_BIN_DIR}/micromamba" ]; then
              echo "micromamba binary restored from cache, skipping download."
            else
              # MM_VERSION="$(cat .circleci/micromamba-version.txt)"
              MM_VERSION="$(tail -1 .circleci/micromamba-version.txt)"
              echo "Installing micromamba ${MM_VERSION}..."
              mkdir -p "${MICROMAMBA_BIN_DIR}"
              curl -fsSL --retry 3 --retry-delay 2 \
                "https://micro.mamba.pm/api/micromamba/linux-64/${MM_VERSION}" \
                | tar -xvjf - \
                  --strip-components=1 \
                  -C "${MICROMAMBA_BIN_DIR}" \
                  bin/micromamba
              chmod 0755 "${MICROMAMBA_BIN_DIR}/micromamba"
            fi
            export PATH="${MICROMAMBA_BIN_DIR}:$PATH"
            echo "export PATH=\"${MICROMAMBA_BIN_DIR}:\$PATH\"" >> "$BASH_ENV"
            which micromamba
            command -v micromamba
            "${MICROMAMBA_BIN_DIR}/micromamba" --version
            test -x "${MICROMAMBA_BIN_DIR}/micromamba"
            ls -l "${MICROMAMBA_BIN_DIR}/micromamba"

            # If you want to quickly use micromamba in an ad-hoc usecase, you can run Linux/bash:
            # export MAMBA_ROOT_PREFIX="$HOME/micromamba"  # optional, defaults to ~/micromamba
            # eval "$("${MICROMAMBA_BIN_DIR}" shell hook -s bash)"  # posix
            # /usr/local/bin/micromamba shell init -s bash -r ~/micromamba  # this writes to your .bashrc file
            # sourcing the bashrc file incorporates the changes into the running session.
            # better yet, restart your terminal!
            # source ~/.bashrc
            # If you want to persist these changes, This also allows you to choose a custom MAMBA_ROOT_ENVIRONMENT, which is where the packages and repodata cache will live.
            # Now you can activate the base environment and install new packages, or create other environments.
            # micromamba activate  # this activates the base environment
            # micromamba install python=3.6 jupyter -c conda-forge
            # or
            # micromamba create -n env_name xtensor -c conda-forge
            # micromamba activate env_name
            # or
            # https://mamba.readthedocs.io/en/latest/installation/micromamba-installation.html#automatic-install
            # "${SHELL}" <(curl -L https://micro.mamba.pm/install.sh)
            # Pin micromamba to 2.0.5-0 (matches documented requirement + upstream's own CI). https://github.com/jupyterlite/xeus/tree/main#installation
            # https://github.com/mamba-org/micromamba-releases/releases https://github.com/mamba-org/micromamba-releases/releases/tag/2.0.5-0
            # RELEASE_URL="https://github.com/mamba-org/micromamba-releases/releases/download/${VERSION}/micromamba-${PLATFORM}-${ARCH}"
            # https://github.com/mamba-org/micromamba-releases/releases/download/2.0.5-0/micromamba-linux-64
            # https://anaconda.org/conda-forge/micromamba/2.0.5/download/linux-64/micromamba-2.0.5-0.tar.bz2
            # curl -fsSL -o "~/.local/bin/micromamba" "https://github.com/mamba-org/micromamba-releases/releases/download/2.0.5-0/micromamba-linux-64"
            # -f — fail on HTTP errors (4xx/5xx), so a bad URL gives a real non-zero exit instead of writing an error page to disk.
            # -s — silent mode, suppresses the progress meter (good for keeping CI logs clean).
            # -S — show error anyway, even with -s on. This is the one I should have included before.
            # -L — follow redirects. GitHub release asset URLs redirect through object storage, so this is required (your original command already had it).
            # sudo curl -fsSL https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvjf bin/micromamba && sudo mv bin/micromamba /usr/local/bin/
            # sudo curl -fsSL -o /usr/local/bin/micromamba "https://github.com/mamba-org/micromamba-releases/releases/download/2.0.5-0/micromamba-linux-64"
            # sudo chmod +x /usr/local/bin/micromamba
      - save_cache:
          key: micromamba-bin-v1-{{ checksum ".circleci/micromamba-version.txt" }}
          paths:
            - /home/circleci/.local/bin/micromamba
      - run:
          name: "Check emscripten channels in micromamba"
          command: |
            curl -I https://repo.mamba.pm/emscripten-forge/noarch/repodata.json || true
            curl -I https://repo.prefix.dev/emscripten-forge-dev/noarch/repodata.json || true
      # -----------------------------------------------------------------
      # Cache 2: the resolved environment (actual installed packages).
      # Key depends on a checksum of environment.yml, so any dependency
      # change correctly invalidates it, while unrelated commits reuse it.
      # -----------------------------------------------------------------
      # - restore_cache:
      #     keys:
      #       - micromamba-env-v1-{{ checksum "environment.yml" }}-{{ arch }}
      # - run:
      #     name: Create environment (skipped if cache hit)
      #     command: |
      #       set -euo pipefail
      #       if [ -d "${MAMBA_ROOT_PREFIX}/envs/${ENV_NAME}" ]; then
      #         echo "Environment '${ENV_NAME}' restored from cache, skipping create."
      #       else
      #         echo "Resolving and installing environment '${ENV_NAME}'..."
      #         micromamba create -y -n "${ENV_NAME}" -f environment.yml
      #       fi
      # - save_cache:
      #     key: micromamba-env-v1-{{ checksum "environment.yml" }}-{{ arch }}
      #     paths:
      #       - /home/circleci/micromamba
      # - run:
      #     name: Run tests
      #     command: |
      #       set -euo pipefail
      #       micromamba run -n "${ENV_NAME}" pytest -q
  pip-install:
    description: Upgrade pip and setuptools and wheel to get as clean an install as possible
    steps:
      - run:
          name: "🐍 Setup Python venv upgrade pip, setuptools, wheel"
          command: |
            set -Eeuo pipefail
            # python -m pip install --upgrade --user --progress-bar=off --pre pip
            # pip install -r ./requirements/build.txt
            pip install -r ./requirements/all.txt

            # tf need for documentation examples
            # pip install -r ./requirements/gpu.txt
            pip install -r ./requirements/cpu.txt
            pip install -r ./requirements/mlflow.txt
            pip install -r ./requirements/corpus.txt

            # pip install voyager==2.1.0
            pip install nltk
            pip install beautifulsoup4 markdownify

            # ✅ It’s a distutils override conflict
            # pip install "setuptools>=69"
            # export SETUPTOOLS_USE_DISTUTILS=local
            pip install -U setuptools

            # ⚠️ Escape the heredoc '\<<' in config or python -c (simplest)
            # python -c "import tensorflow as tf, google.protobuf as pb; print('tf', tf.__version__); print('protobuf', pb.__version__)"
            # python -m pip check
            pip install -U "protobuf<7"

            # JupyterLab: dark theme (optional)
            pip install ipywidgets ipyevents ipympl ipycanvas ipyleaflet
            pip install jupyterlab-night jupyterlab_miami_nights jupyterlab-fasta jupyterlab-geojson

            # Additional jupyterlite (optional)
            # Or with pip (you must install micromamba 2.0.5):
            # https://github.com/jupyterlite/xeus#installation
            # pip install jupyterlite-javascript-kernel
            pip install -U \
              jupyterlite-core \
              jupyterlite-sphinx \
              jupyterlite-pyodide-kernel \
              jupyterlite-xeus \
              jupyterlite-terminal
  build-scikit-plots:
    description: build scikit-plots
    steps:
      - run:
          name: "📦 build scikit-plots"
          command: |
            # cpu: tensorflow
            # pip install --no-cache-dir .[build,dev,test,doc]
            python -m pip install --no-build-isolation --no-cache-dir . -v
  # upload-codecov:
  #   description: Upload coverage results to codecov
  #   steps:
  #     - run:
  #         name: "☂️ Upload coverage results to codecov"
  #         # https://uploader.codecov.io/linux/latest
  #         command: |
  #           curl -Os https://uploader.codecov.io/latest/linux/codecov
  #           chmod +x codecov
  #           ./codecov -t ${CODECOV_TOKEN} -f coverage.xml
  build-docs:
    description: build documentation scikit-plots
    steps:
      - attach_workspace:
          at: ~/
      # This calls your custom command
      - check-skip  # check skip CI
      ## deps
      # This calls your custom command
      - apt-install  # need graphviz etc. to build the documentation
      - npm-install  # jupyterlite_sphinx need terminal kernel
      - micromamba-install  # jupyterlite_sphinx need Xeus kernel "Or with pip (you must install micromamba):"
      # - pip-install
      - run:
          name: "📘 build docs"
          # no_output_timeout: 25m
          command: |
            export PYTHONPATH=$PWD/build-install/lib/python3.12/site-packages
            cd docs && make html 2>&1 | tee ~/sphinx_log.txt
      - run:
          name: Check to show sphinx log for warnings (which are treated as errors)
          when: always
          command: |
            # Condition	    grep exit code
            # Found match	  0
            # No match	    1
            # Error	        2
            # After !:
            # Condition	    Result
            # Found warning	1
            # No warning	  0
            # grep error	  0 (because non-zero is inverted)
            # The ! in shell means invert the exit code.
            # Exited with code exit status 1
            # ! grep "^.* ERROR: .*$" ~/sphinx_log.txt
            # ! grep "^.* WARNING: .*$" ~/sphinx_log.txt
            # echo $?
            # grep "^.* WARNING: .*$" ~/sphinx_log.txt || true
            if grep -q "^.* WARNING: .*$" ~/sphinx_log.txt; then
                echo "Warnings found:"
                grep "^.* WARNING: .*$" ~/sphinx_log.txt || true
            fi
      - run:
          name: Save sphinx traceback
          when: always
          command: |
            cp /tmp/sphinx-err-*.log ~/sphinx-traceback.log || true
      # you must store the artifact explicitly:
      - store_artifacts:
          path: ~/sphinx_log.txt
          destination: sphinx_log.txt
      - store_artifacts:
          path: ~/sphinx-traceback.log
          destination: sphinx-traceback.log
      - store_artifacts:
          # path: docs/build/html/stable/index.html  # index.html
          path: docs/build/html/stable
          destination: docs/build/html/stable  # CircleCI to preserve the full directory structure
          # destination: docs  # (docs/index.html because of destination: docs).
        # Persists generated documentation so that it can be attached and deployed
        # in the 'deploy' step.
      - persist_to_workspace:
          # root: ~/repo
          root: docs/build/html
          paths:
            # - docs/build/html/stable
            # - docs/build/html/stable/index.html
            - .
      - run:
          name: "🔗 Docs available at:"
          # https://app.circleci.com/pipelines/<org>/<repo>/<pipeline_number>/workflows/<workflow_id>/jobs/<job_id>/artifacts
          command: |
            echo "🔗 Local artifact URL:"
            echo "${CIRCLE_BUILD_URL}/artifacts/${CIRCLE_NODE_INDEX}/docs/build/html/stable/index.html"
  # Run benchmarks
  # Reference guide checking

