# https://support.circleci.com/hc/en-us/articles/360043638052-Conditional-steps-in-jobs-and-conditional-workflows
# Add a Pipeline Parameter and Trigger
# Project Settings → Triggers → Add Trigger
# Fill out:
# Trigger Source: GitHub App
# Event: "Label added to PR"
# Label: run-ci (your label name)
# Parameters:
# {
#   "run_docs_build": true
# }
# This tells CircleCI:
# When a PR gets the label run-ci, start a pipeline with run_docs_build: true.
parameters:
  run_docs_build:
    type: boolean
    default: false

# YAML anchor & alias, Aliases to reuse `<<: *alias`
_defaults: &defaults
  ## https://circleci.com/docs/install-machine-runner-3-on-linux/
  # machine: true
  ## https://circleci.com/docs/container-runner-installation/
  ## https://circleci.com/docs/guides/execution-managed/using-docker
  docker:
    # CircleCI maintains a library of pre-built images
    # - image: cimg/base:current-22.04
    # documented at https://circleci.com/developer/images/image/cimg/python
    ## https://circleci.com/docs/guides/execution-managed/using-docker/#specifying-docker-images
    - image: cimg/python:3.12  # cimg/python:3.11 cimg/base:2026.06
  environment:
    # NPX_INSTALL_DIR: /home/circleci/.local/npx     # "~/.local/npx"
    # NPM_INSTALL_DIR: /home/circleci/.local/npm     # "~/.local/npm"
    NODE_INSTALL_DIR: /home/circleci/.local/node   # "~/.local/node"
    MICROMAMBA_BIN_DIR: /home/circleci/.local/bin  # "~/.local/bin"
    MAMBA_ROOT_PREFIX: /home/circleci/micromamba   # "~/micromamba"
    # ENV_NAME: myenv
  # environment:
  #   - MKL_NUM_THREADS: 2
  #   - OPENBLAS_NUM_THREADS: 2
  #   - CONDA_ENV_NAME: testenv
  #   - LOCK_FILE: build_tools/circle/doc_linux-64_conda.lock
  #   # Make sure that we fail if the documentation build generates warnings with
  #   # recent versions of the dependencies.
  #   - SKLEARN_WARNINGS_AS_ERRORS: '1'
  working_directory: ~/repo  # "/home/circleci/repo"
  ## https://circleci.com/docs/configuration-reference/#resourceclass
  ## https://circleci.com/docs/guides/execution-managed/using-docker/#arm
  ## https://circleci.com/docs/guides/execution-managed/using-docker/#x86
  ## https://circleci.com/docs/guides/execution-managed/using-docker/#gen1
  ## https://circleci.com/docs/guides/execution-managed/using-docker/#using-docker-gen2
  # resource_class: xlarge  # xlarge.gen2

# https://github.com/codecov/example-javascript/blob/main/.circleci/config.yml
# orbs:
