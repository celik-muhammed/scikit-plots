# https://yaml-multiline.info/
#
# https://github.com/pre-commit/pre-commit/blob/main/.pre-commit-config.yaml
# https://github.com/asottile/pyupgrade/pull/365
---
ci:
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  autofix_prs: false
  autoupdate_schedule: 'monthly'

# files: ^(.*\.(py|json|md|sh|yaml|yml|in|cfg|txt|rst|toml|precommit-toml|wordlist))$
# exclude: ^(\.[^/]*cache/.*)$
# exclude: "^cextern"

# rm -rf ~/.cache/pre-commit
# pre-commit clean
# pre-commit autoupdate
# pre-commit install
repos:

  # - repo: https://github.com/asottile/pyupgrade
  #   rev: v3.21.2
  #   hooks:
  #   -   id: pyupgrade
  #       args: [--py38-plus]

  # Optional: Spell Checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      # pre-commit run codespell --all-files --verbose
      - id: codespell
        args: ["--write-changes"]  # "--ignore-words", ".codespellrc-ignore-words" [--ignore-words-list=ser]
        # files: \.(py|rst|md)$
        # If one configures codespell using the pyproject.toml file instead use:
        additional_dependencies:
          # pyproject.toml (only if the tomli library is available for Python < 3.11)
          - tomli
        exclude: |  # '\.ipynb$'  # Excludes .ipynb files from codespell checks
          (?x)(
            ^scikitplot/_core/ |  # exclude folder
            ^tests/data/ |        # exclude test data folder
            \.svg$ |              # exclude all .svg files
            \.lock$               # exclude lock files
          )

  # Optional: Custom Hook for RST Errors and Unicode Replacement
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: rst-directive-colons  # Detect mistake of rst directive not ending with double colon.
      - id: rst-inline-touching-normal  # Detect mistake of inline code touching normal text in rst.
      - id: text-unicode-replacement-char  # Forbid files with a UTF-8 Unicode replacement character.

  # - repo: https://github.com/Lucas-C/pre-commit-hooks-markup
  #   rev: v1.0.1
  #   hooks:
  #     - id: rst-linter

  # Documentation and Specialized Linting
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      # pre-commit run zizmor --all-files --verbose
      - id: zizmor

  # Critical Checks: Sensitive data, large files, and merge conflicts
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # - id: requirements-txt-fixer
      # - id: check-docstring-first
      - id: no-commit-to-branch  # Default is master and main.
        # args: ["--branch=main"]
      - id: check-merge-conflict  # Checks for merge conflict markers in files.
      - id: detect-private-key  # Checks for the existence of private keys.
      - id: check-added-large-files  # Prevent giant files from being committed.
        args: ["--enforce-all", "--maxkb=333"]  # 333 KB is the default size limit.
        exclude: "^(\
            benchmarks/.*|\
            docker/.*|\
            docs/source/.jupyterlite.doit.db|\
            docs/source/_static/gallery/.*|\
            docs/source/_static/logos/.*|\
            docs/source/_static/user_guide/corpus_any_to_any_architecture.png|\
            docs/source/learn/.*\\.py|\
            docs/source/logos/.*|\
            docs/source/devel/sampledoc.pdf|\
            docs/source/user_guide/random/GoodPracticeRNG.pdf|\
            .*searchindex.dat|\
            .*CDNOW_master.txt|\
            .*example_transactions.csv|\
            .*ai-assistant.js|\
            .*ai-assistant.css|\
            galleries/.*|\
            pixi-packages/scipy/pixi.lock|\
            third_party/.*|\
            scikitplot/cexternals/annoy/ann.png|\
            scikitplot/cexternals/_annoy/src/annoymodule.cc|\
          )$"

  # Syntax Validation: JSON, YAML, TOML, XML, etc.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json  # Attempts to load all json files to verify syntax.
        # exclude: "^(settings\\.json|\\.devcontainer/.*\\.json|benchmarks/asv\\.conf\\.json)$"
        exclude: "^(\
            \\.devcontainer/.*\\.json\
            |\\.vscode/.*\\.json*\
            |benchmarks/asv\\.conf\\.json\
          )$"
      - id: check-yaml  # Attempts to load all yaml files to verify syntax.
        # exclude: ".*(.github.*)$"
        exclude: "^(\
            \\.conda-forge-recipes/.*/.*\\.yaml\
          )$"
      - id: check-toml  # Attempts to load all TOML files to verify syntax.
        exclude: "^(\
            docker/env_pipenv/py38/.*\\.template\
            |docker/env_pipenv/py39/.*\\.template\
          )$"
      - id: check-xml   # Attempts to load all xml files to verify syntax.

  # Conflict Prevention: Filename and symlink issues
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict  # Checks for file naming conflicts on case-insensitive filesystems.
      - id: check-symlinks  # Checks for symlinks which do not point to anything.
      # - id: name-tests-test
      # - id: debug-statements

  # Cleanliness and Formatting: Whitespace, line endings, and file endings
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # This hook replaces double quoted strings with single quoted strings.
      # - id: double-quote-string-fixer
      - id: end-of-file-fixer  # Ensures files end in a newline.
        exclude_types: [svg]
      - id: trailing-whitespace  # Trims trailing whitespace.
        name: Trim Trailing Whitespace
        description: This hook trims trailing whitespace.
        exclude_types: [svg]  # Python Covered by Ruff W291?
      - id: mixed-line-ending  # Checks for mixed line endings.

  # Comprehensive CI pipeline:
  # Source
  #   │
  #   ▼
  # isort / Ruff import sorting-ordering
  #   │
  #   ▼
  # autoflake
  #   │
  #   ▼
  # pyupgrade
  #   │
  #   ▼
  # flynt
  #   │
  #   ▼
  # refurb
  #   │
  #   ▼
  # Ruff --fix Import sorting, lint fixes, modernization, cleanup
  #   │
  #   ▼
  # Black / Ruff format Formatting only
  #   │
  #   ▼
  # Ruff (check)
  #   │
  #   ▼
  # Pylint Deep static analysis and design checks
  #   │
  #   ▼
  # Bandit Security analysis
  #   │
  #   ▼
  # Vulture Dead code detection
  #   │
  #   ▼
  # MyPy / Pyright Static type checking
  #   │
  #   ▼
  # pytest Unit and integration testing / Hypothesis Property-based testing
  #   │
  #   ▼
  # Coverage (coverage.py / pytest-cov)
  #
  # 1. cython-lint (fixes, if any)
  # 2. double-quote-cython-strings
  # 3. isort (or Ruff I rules)
  # 4. autoflake
  # 5. pyupgrade
  # 6. flynt
  # 7. refurb
  # 8. ruff-check --fix
  # 9. black OR ruff-format (choose one formatter)
  # ────────────────────────────────────────
  # 10. flake8
  # 11. ruff-check (without --fix)   ← optional but recommended in CI
  # 12. mypy
  # 13. pylint (if used)
  # 14. bandit
  # 15. vulture
  # 16. pytest
  # 17. coverage

  # 1. Cython formatting/fixes Linting
  - repo: https://github.com/MarcoGorelli/cython-lint
    rev: v0.21.0
    hooks:
      # TODO: add the double-quote-cython-strings hook when it's usability has improved:
      # possibility to pass a directory and use it as a check instead of auto-formatter.
      - id: double-quote-cython-strings
      # pre-commit run cython-lint --all-files --verbose
      - id: cython-lint

  # 2. Ruff auto-fixes
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      # - id: ruff  # Run the linter.
      # pre-commit run ruff-check --all-files --verbose
      - id: ruff-check  # Change linter ruff hook → ruff-check
        args: ["--fix", "--show-fixes", "--output-format=full", "--verbose"]  # --unsafe-fixes
        # types_or: [ python, pyi ]

  # 3. Formatter (choose ONE)
  # Code Quality: Formatter black vs ruff-format can be conflict make sure both compatipable
  # - repo: https://github.com/psf/black
  # Using this mirror lets us use mypyc-compiled black, which is about 2x faster
  # black --verbose --check --diff .
  # pre-commit run black --verbose
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      # pre-commit run black --all-files --verbose
      - id: black
        name: black
        description: "Black: The uncompromising Python code formatter"
        entry: black
        language: python
        # It is recommended to specify the latest version of Python
        # supported by your project here, or alternatively use
        # pre-commit's default_language_version, see
        # https://pre-commit.com/#top_level-default_language_version
        # language_version: python3.11
        types_or: [python, pyi]
        args:
          # - --config=pyproject.toml   # Optional: use custom config file
          # - -t, --target-version
          - --verbose                 # Show additional debugging or context info.
          - --check                   # Check if files are formatted. Exit with code 1 if reformatting is needed, but don’t change files.
          - --diff                    # Show a diff of what would change, without writing changes to disk. Often used with --check.
          ## Keep Sync: in YAML — pyproject.toml, Black uses pyproject.toml for configuration.
          - --force-exclude
          - "/(\
              \\.eggs\
              |\\.git\
              |\\.mypy_cache\
              |\\.vscode\
              |benchmarks\
              |build\
              |dist\
              |docs/build\
              |docs/source\
              |galleries\
              |third_party\
              |tools\
              |tests\
              |scikitplot/cexperimental\
              |scikitplot/cexternals\
              |scikitplot/cython/_templates\
              |scikitplot/experimental\
              |scikitplot/externals\
              |scikitplot/visualkeras\
            )/"
        # verbose: true  # Force Black to show which files were modified
        # exclude: '/(\.eggs|\.git|\.mypy_cache|\.vscode|benchmarks|build|dist|docs/build|docs/source|galleries|third_party|tools|tests)/'

  # - repo: https://github.com/charliermarsh/ruff
  #   rev: v0.0.276  # Replace with the latest release version of Ruff
  #   hooks:
  #     - id: ruff
  #       name: ruff (Python linter)
  #       files: \.py$
  #       args: ["--config", ".ruff.toml"]  # Point to your custom ruff.toml file
  # Code Quality: Linting and Formating Static Analysis
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      # Formatter: ruff-format vs flake8 can be conflict make sure both compatipable
      # pre-commit run ruff-format --all-files --verbose
      - id: ruff-format  # Run the formatter.
        args:
          - --verbose                 # Show additional debugging or context info.
          # - --check                   # Check if files are formatted. Exit with code 1 if reformatting is needed, but don’t change files.
          # - --diff                    # Show a diff of what would change, without writing changes to disk. Often used with --check.
          # - --preview                 # Enables preview formatting features that are experimental or not yet stable.
          # - --config=pyproject.toml   # Optional: use custom config file
        # verbose: true  # Force Ruff to show which files were modified
        # types_or: [ python, pyi ]

  # 4. Check-only linters
  # Code Quality: Formatter PyCQA flake8 vs ruff-format can be conflict make sure both compatipable
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      # pre-commit run flake8 --all-files --verbose
      - id: flake8
        additional_dependencies:
          - flake8-bugbear  # Catches common situations that tend to create bugs.
          - flake8-docstrings>=1.7.0  # --docstring-convention=pep257 is default, numpy and google also allowed.
          - flake8-force
          - flake8-type-checking
          - pydocstyle>=6.3.0
        args: [--config=.flake8, --docstring-convention=all]  # '--exit-zero' Customize as needed.
        types: [file, python]
        # exclude: ^scikitplot/(externals/|_seaborn/)

  # 5. Type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      # pre-commit run mypy --all-files --verbose
      - id: mypy
        pass_filenames: false  # Prevent passing filenames to the hook.
        args:  # [--config-file=.mypy.ini, --follow-imports=skip]
          - --config-file=.mypy.ini
          - --follow-imports=skip
          - --no-incremental  # skip: Serializes the AST and type information into .mypy_cache.
          # - --cache-dir=/dev/null
          - --show-traceback
          # - -v
        # Use regex to specify the files to check
        files: scikitplot/externals/_seaborn/_(core|marks|stats)/
        additional_dependencies:  # [pytest, numpy]
          - pytest
          - numpy
        # exclude: utils

  # - repo: https://github.com/pre-commit/mirrors-prettier
  #   rev: v4.0.0-alpha.8
  #   hooks:
  #     - id: prettier

  # Optional: Custom Repository Review
  - repo: https://github.com/scientific-python/cookie
    rev: 2026.06.18
    hooks:
      # pre-commit run sp-repo-review --all-files --verbose
      - id: sp-repo-review

