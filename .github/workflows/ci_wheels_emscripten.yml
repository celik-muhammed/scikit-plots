# ══════════════════════════════════════════════════════════════════════════════
# CI Wheels — Emscripten / Pyodide (WebAssembly)
# ══════════════════════════════════════════════════════════════════════════════
#
# Concept      Analogy                        Role
# ──────────── ────────────────────────────── ───────────────────────────────
# WASM         Machine code                   Target binary format (WASM VM)
# WebAssembly  CPU architecture               Platform-independent bytecode spec
# Emscripten   Compiler (like GCC)            Compiles C/C++ → WASM (via LLVM)
# Pyodide      Python interpreter on WASM     CPython compiled via Emscripten
#
#  ┌──────────────────────────────┐
#  │         Your Browser         │
#  │  ┌────────────────────────┐  │
#  │  │  WebAssembly Runtime   │  │ ← part of browser
#  │  │  Runs .wasm binaries   │  │
#  │  └──────────┬─────────────┘  │
#  │     ┌───────▼──────────┐     │
#  │     │     Pyodide      │     │ ← CPython + Emscripten + packages → .wasm
#  │     └──────────────────┘     │
#  └──────────────────────────────┘
#
# References:
#   https://pyodide.org/en/stable/development/abi.html#platform-versions
#   https://cibuildwheel.pypa.io/en/stable/options/#enable
#   https://anaconda.org/channels/pyodide
#
# Keep in sync with docs/source/jupyter-lite.json:
#   https://cdn.jsdelivr.net/pyodide/v314.0.0/full/pyodide.js
#   https://cdn.jsdelivr.net/pyodide/v0.29.4/full/pyodide.js
#   https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js
#
# ── Compatibility truth table ─────────────────────────────────────────────────
#
#  Python │ Pyodide   │ CIBW  │ Wheel tag                     │ PyPI │ anaconda_label         │ latest │ Notes
#  ───────┼───────────┼───────┼───────────────────────────────┼──────┼────────────────────────┼────────┼──────────
#  cp312  │ 0.28.3    │  v3   │ pyodide_2024_0_wasm32         │  ❌  │ pyodide-0.28.3         │  no    │ version-pinned slot only
#  cp313  │ 0.28.3    │  v3   │ pyodide_2025_0_wasm32         │  ❌  │ pyodide-0.28.3         │  no    │ version-pinned slot only
#  cp312  │ 0.29.4    │  v3   │ pyodide_2024_0_wasm32         │  ❌  │ pyodide-0.29.4         │  yes   │ + default/rollup channel
#  cp313  │ 0.29.4    │  v3   │ pyodide_2025_0_wasm32         │  ❌  │ pyodide-0.29.4         │  yes   │ + default/rollup channel
#  cp312  │ 314.0.0   │  v4   │ pyemscripten_2024_0_wasm32    │  ❌  │ pyemscripten-314.0.0   │  yes   │ pyodide-eol · allow_failure — see note
#  cp313  │ 314.0.0   │  v4   │ pyemscripten_2025_0_wasm32    │  ✅  │ pyemscripten-314.0.0   │  yes   │ + default/rollup channel
#  cp314  │ 314.0.0   │  v4   │ pyemscripten_2026_0_wasm32    │  ✅  │ pyemscripten-314.0.0   │  yes   │ + default/rollup channel
#  ───────┴───────────┴───────┴───────────────────────────────┴──────┴────────────────────────┴────────┴──────────
#
# "anaconda_label" and "latest" drive the Anaconda.org upload-label architecture
# — see the dedicated section below the cibuildwheel flag semantics notes.
#
# NOTE — "v3 + pyodide-eol" (fixed 2026-06-21, was a hard failure):
#   The two v3 cp312 rows used to carry cibw_enable: "pypy-eol pyodide-eol".
#   Confirmed by direct inspection of cibuildwheel/selector.py for the pinned
#   v3.4.1 wheel: its EnableGroup enum has NO "pyodide-eol" member (only
#   cpython-freethreading, cpython-prerelease, graalpy, pypy, pypy-eol,
#   pyodide-prerelease). Passing it crashed CLI argument parsing — exit code 2,
#   before any build started ("Failed to parse enable group: pyodide-eol").
#   v3.4.1 also has no cp312/pyodide build-id gating logic at all, so cp312
#   needs NO special enable flag under CIBW v3 — "pypy-eol" alone is correct
#   and matches the cp313 rows.
#
# NOTE — "cp312 × Pyodide 314.0.0 (CIBW v4)" — kept, marked allow_failure:
#   cibuildwheel 4.1.0 DOES define EnableGroup.PyodideEoL = "pyodide-eol", with
#   an explicit gate in selector.py:
#     if EnableGroup.PyodideEoL not in enable and fnmatch(build_id, "cp312-pyodide_*"):
#         return False
#   So "pyodide-eol" is genuinely required here and the CLI parses it fine —
#   this is NOT the same bug as the v3 rows above. The real failure happens one
#   layer deeper: cibuildwheel 4.1.0 does not actually fetch the 314.0.0
#   xbuildenv for cp312 — observed in run #63 (job 82521880793) it silently
#   installs xbuildenv 0.27.7 instead ("Installing Pyodide xbuildenv version:
#   0.27.7"). That xbuildenv's bundled python-3.12.pc reports
#   `-I/usr/include/python3.12` (the HOST's native include path, which isn't
#   even installed on the runner) instead of its own bundled WASM Python.h, so
#   meson's `has_header('Python.h', dependencies: dep_py)` sanity check fails
#   before any project code compiles:
#     ERROR: Assert failed: meson.get_compiler('c').has_header('Python.h', ...)
#   This is upstream xbuildenv/pkgconfig metadata breakage — not fixable in
#   this repo's meson.build. Forcing it to "succeed" (e.g. apt-installing host
#   python3.12-dev so the header merely exists) would link the wasm32 build
#   against the wrong CPython ABI and risks a silently broken extension; that's
#   a worse outcome than a red job.
#   The row is kept (not deleted) with allow_failure: "true", wired to
#   `continue-on-error:` at job level (see Step 3a/3b below), so it keeps
#   probing on every scheduled run without turning the whole workflow red. The
#   moment upstream ships a working 314.x-line xbuildenv for cp312, this row
#   starts passing on its own — no manual re-enable needed. If it's still
#   failing the same way after a future Pyodide/cibuildwheel version bump,
#   re-read this note before assuming it's a new bug.
#
# WHY include-only matrix, not cross-product (python × pyodide):
#   A 3×3 cross-product creates 9 jobs. Only 7 are valid — cp314 is unsupported
#   by Pyodide ≤ 0.29.x. More critically, each valid combination requires a
#   DIFFERENT cibuildwheel version, CIBW_ENABLE flags, wheel tag, and runner.
#   An include-only matrix makes every field explicit, prevents invalid builds,
#   and makes the log identity of each job immediately readable.
#
# WHY two conditional build steps instead of one dynamic step:
#   GitHub Actions does not allow expressions in the `uses:` field. The action
#   hash must be a literal string. Two steps — each guarded by
#   `if: matrix.cibw_series == 'vN'` — is the canonical pattern.
#
# ── cibuildwheel flag semantics ───────────────────────────────────────────────
#   pyodide-eol   cibuildwheel ≥ 4.x ONLY (cibuildwheel/selector.py
#                 EnableGroup). Gates cp312 under the pyodide platform — omit
#                 it on v4 and cp312 is silently excluded rather than
#                 attempted. NOT recognized by cibuildwheel 3.4.1 (pinned for
#                 CIBW v3 below): passing it there is a hard CLI parse error,
#                 not a no-op. Used only by the allow_failure cp312×314.0.0
#                 row; the two v3 cp312 rows need no enable flag at all.
#   pypy-eol      No-op for Pyodide/WASM (PyPy ≠ WebAssembly). Kept for
#                 consistency with the project's CIBW_ENABLE convention.
#
# ── allow_failure semantics ───────────────────────────────────────────────────
#   allow_failure "true" wires `continue-on-error:` at job level for that row
#   only. The job still runs, still builds, still uploads a step summary and
#   logs — it just can't flip the overall workflow run to "Failure" if the
#   build step fails. Used for exactly one row today (see note above). Default
#   "false" everywhere else; a typo'd "true" elsewhere would silently hide a
#   real regression, so keep this field explicit per row rather than inferring
#   it from pypi_ok or cibw_series.
#
# ── Anaconda.org upload-label architecture ────────────────────────────────────
#
#   PROBLEM THIS SOLVES (was an active bug, fixed 2026-06-21):
#   The wheel filename's platform tag (whl_tag, e.g. pyodide_2024_0_wasm32)
#   encodes the CPython "year slot", NOT the precise Pyodide SDK version. Both
#   the 0.28.3 and 0.29.4 rows for cp312 therefore produce a WHEEL WITH THE
#   IDENTICAL FILENAME. upload_wheels.sh uses `anaconda upload --force`
#   (intended for overwriting YESTERDAY's nightly with TODAY's, across days) —
#   within a single run this meant the second matching upload silently
#   discarded the first one on Anaconda.org. 6 builds → only 4 distinct files
#   survived.
#
#   FIX — two fields per matrix row, resolved into TWO upload destinations:
#
#     anaconda_label  Static per-(Pyodide-version) label SUFFIX, e.g.
#                      "pyodide-0.28.3", "pyodide-0.29.4",
#                      "pyemscripten-314.0.0". At upload time (Step 0b below)
#                      this is prefixed with a sanitized branch slug to form
#                      the VERSION-PINNED label — e.g. branch "main" + this
#                      field "pyodide-0.29.4" → "main-pyodide-0.29.4". EVERY
#                      row uploads here, unconditionally. This is what "Add
#                      pyodide_version to a separate upload label per Pyodide
#                      version" means in practice — every SDK version gets its
#                      own permanent, collision-free slot, addressable forever
#                      (e.g. for JupyterLite configs pinned to an old Pyodide).
#
#     is_latest        "true" for exactly one row per whl_tag — the row whose
#                      Pyodide SDK version is the one a plain
#                      `pip install scikit-plots` (no label) should resolve
#                      to. ONLY rows with is_latest: "true" ALSO upload to the
#                      default/rollup channel (see below). Rows with
#                      is_latest: "false" (today: the two 0.28.3 rows) upload
#                      ONLY to their version-pinned label — this is the
#                      "skip uploading the older/redundant version […]
#                      especially main label" requirement: 0.28.3 simply never
#                      touches the default channel, so there is nothing for
#                      0.29.4 to silently overwrite there.
#
#   DEFAULT / ROLLUP CHANNEL (the second upload, is_latest rows only):
#     On the production branch (ref name == "main"): uploaded with NO --label
#     flag — anaconda-client's own true default label ("main" on Anaconda.org)
#     — BYTE-IDENTICAL to this workflow's upload command before this redesign.
#     Existing consumers (`pip install` against the unlabeled channel) are
#     unaffected.
#     On any OTHER branch (e.g. a maintenance branch manually dispatched):
#     uploaded to a label equal to the sanitized branch slug alone (no version
#     suffix), e.g. "maintenance-1-0-x". This is "add branch logic to
#     different branch for label" — a non-production branch run can never
#     overwrite the real production "main" channel, while still getting its
#     own always-fresh rollup label.
#
#   WHERE THIS IS IMPLEMENTED:
#     • Matrix fields (anaconda_label, is_latest)   → strategy.matrix.include below
#     • Field validation                            → Step 1
#     • Cross-row collision guardrail                → job validate-upload-labels
#     • Branch-slug + final label resolution         → Step 0b
#     • Visibility in logs / step summary             → Step 2, Step 8
#     • Actual dual upload                            → Step 8
#     • Label plumbing (--label flag)                 → tools/wheels/upload_wheels.sh
#       (ANACONDA_LABEL is OPTIONAL there — any other CI workflow sourcing
#       that script without setting it keeps its exact pre-existing,
#       single-unlabeled-upload behavior; this is purely additive)
#
#   ADDING A NEW PYODIDE VERSION LATER (e.g. 0.30.0 under CIBW v3):
#     1. Add the new row(s) with anaconda_label: "pyodide-0.30.0" and
#        is_latest: "true".
#     2. Flip the PREVIOUS latest row for the same whl_tag (today: 0.29.4) to
#        is_latest: "false" — exactly one row per whl_tag may be "true".
#     3. Update the ROWS table inside the validate-upload-labels job to match
#        — it will fail the run loudly if you forget step 2 and leave two
#        is_latest: "true" rows sharing a whl_tag.
# ─────────────────────────────────────────────────────────────────────────────
---
name: "CI 📦 Wheels Emscripten/Pyodide"


on:
  workflow_dispatch:
    inputs:
      anaconda_staging:
        description: >-
          Push wheels to Anaconda.org on successful build.
          Warning: 'scikit-plots-wheels-staging' overwrites existing wheels.
        required: false
        default: 'scikit-plots-wheels-staging-nightly'
        type: choice
        options:
          - 'scikit-plots-wheels-staging'          # stable staging  (IS_PUSH=true)
          - 'scikit-plots-wheels-staging-nightly'  # nightly channel (IS_PUSH=false)

      target_python:
        description: >-
          Run only the matrix row(s) for this CPython tag. Use 'all' to run
          the full 7-row matrix (default — same behavior as before this
          input existed). Lets you debug one version's log without scrolling
          past 6 unrelated jobs.
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'cp312'
          - 'cp313'
          - 'cp314'

  # pull_request:
  #   branches: [main, "maintenance/**"]
  #   paths-ignore: ["**.pyi", "**.md", "**.rst", "tools/stubtest/**"]

  schedule:
    # Every Monday at 11:11 UTC — nightly nightly channel.
    # https://crontab.io / https://crontab.cronhub.io
    #
    #   ┌──── minute (0-59)
    #   │  ┌─ hour (0-23)
    #   │  │  ┌ day-of-month (1-31)
    #   │  │  │ ┌ month (1-12)
    #   │  │  │ │ ┌ day-of-week (0-7, SUN=0 or 7)
    - cron: '11 11 * * 1'


# Cancel superseded runs within the same workflow + branch.
# PR runs use head_ref (branch name); push/schedule runs use run_id.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true


# Minimal permissions at workflow level.
# The job inherits and redeclares these (defense in depth).
permissions:
  contents: read  # checkout only


env:
  FORCE_COLOR: 3  # Colorised output in cibuildwheel / pip logs


jobs:
  # ── Pre-build: validate Anaconda upload-label invariants across ALL rows ──
  #
  # WHY a separate, non-matrix job:
  #   Each matrix job only sees its OWN row (matrix.anaconda_label,
  #   matrix.is_latest, etc.) — there is no way to compare rows against each
  #   other from inside a matrix step. This small pre-job hardcodes the same
  #   per-row data the matrix below uses and checks the two invariants that,
  #   if violated, would silently reintroduce the original Anaconda.org
  #   overwrite bug (two wheels landing on the same upload slot, last writer
  #   wins — see "Anaconda.org upload-label architecture" note above):
  #
  #     1. No two rows share the same (python, anaconda_label) pair — that
  #        would mean two version-pinned uploads collide.
  #     2. No two rows with the SAME whl_tag both have is_latest: "true" —
  #        that would mean two wheels both target the default/rollup channel
  #        for the same Python build, recreating the exact bug this design
  #        fixes.
  #
  # MAINTENANCE: when you add/remove/change a matrix row below, update the
  #   ROWS table in this job to match. If you forget, this job's check is
  #   simply stale (it won't see the new row) — it does NOT falsely pass a
  #   bad new row as "validated". Step 1 in the build job independently
  #   catches malformed individual rows regardless of this job.
  #
  validate-upload-labels:
    name: "🔍 Validate Anaconda upload-label uniqueness"
    runs-on: ubuntu-24.04
    # Same fork guard as the build job, for consistency — this check has no
    # secrets dependency, but matching the gate keeps the two jobs' on/off
    # behavior predictable from one read of the file.
    if: github.repository == 'scikit-plots/scikit-plots'
    permissions:
      contents: read
    steps:
      - name: "Check (python, anaconda_label) and (whl_tag, is_latest) invariants"
        env:
          # One line per ACTIVE matrix row below:
          #   python|whl_tag|anaconda_label|is_latest
          # KEEP IN SYNC with jobs.build-wasm-emscripten.strategy.matrix.include.
          ROWS: |
            cp312|pyodide_2024_0_wasm32|pyodide-0.28.3|false
            cp313|pyodide_2025_0_wasm32|pyodide-0.28.3|false
            cp312|pyodide_2024_0_wasm32|pyodide-0.29.4|true
            cp313|pyodide_2025_0_wasm32|pyodide-0.29.4|true
            cp313|pyemscripten_2025_0_wasm32|pyemscripten-314.0.0|true
            cp314|pyemscripten_2026_0_wasm32|pyemscripten-314.0.0|true
        run: |
          fail=0

          # Invariant 1: (python, anaconda_label) pairs must be unique —
          # otherwise two rows write the SAME version-pinned label and the
          # second silently overwrites the first.
          declare -A label_seen=()
          while IFS='|' read -r py tag label latest; do
            [[ -z "$py" ]] && continue
            key="${py}|${label}"
            if [[ -n "${label_seen[$key]+x}" ]]; then
              echo "::error::Duplicate version-pinned upload slot: python='$py' anaconda_label='$label'"
              echo "::error::Two rows would silently overwrite each other on Anaconda.org. Give each row a distinct anaconda_label."
              fail=1
            fi
            label_seen["$key"]=1
          done <<< "$ROWS"

          # Invariant 2: at most ONE is_latest=true row per whl_tag —
          # otherwise two rows both target the default/rollup channel for the
          # same Python build, recreating the original overwrite bug one
          # layer up.
          declare -A latest_seen=()
          while IFS='|' read -r py tag label latest; do
            [[ -z "$py" ]] && continue
            if [[ "$latest" == "true" ]]; then
              if [[ -n "${latest_seen[$tag]+x}" ]]; then
                echo "::error::Two rows share whl_tag='$tag' and BOTH have is_latest=true."
                echo "::error::Both would upload to the SAME default/rollup channel — recreating the original overwrite bug."
                echo "::error::Exactly one row per whl_tag may have is_latest=true. Set the older row's is_latest to 'false'."
                fail=1
              fi
              latest_seen["$tag"]=1
            fi
          done <<< "$ROWS"

          if [[ "$fail" -eq 0 ]]; then
            echo "✅ All (python, anaconda_label) pairs are unique, and each whl_tag has at most one is_latest=true row."
          fi
          exit "$fail"


  build-wasm-emscripten:
    needs: [validate-upload-labels]

    # ── Job name ────────────────────────────────────────────────────────────
    # Encodes the full matrix identity so each job is immediately identifiable
    # in the GitHub Actions UI without opening the run log.
    # Format: cp312 × Pyodide-v0.28.3 · CIBW-v3 [pyodide_2024_0_wasm32] ❌PyPI
    name: >-
      ${{ matrix.python }} × Pyodide-v${{ matrix.pyodide_version }} ·
      CIBW-${{ matrix.cibw_series }}
      [${{ matrix.whl_tag }}]
      ${{ matrix.pypi_ok == 'true' && '✅PyPI' || '❌Staged' }}

    runs-on: ${{ matrix.build_platform }}

    # Wired to matrix.allow_failure (see "allow_failure semantics" in the file
    # header). "true" for exactly one row today — a build that fails on a known
    # upstream xbuildenv bug, kept in the matrix to auto-recover once fixed
    # upstream without blocking the rest of this workflow's status.
    continue-on-error: ${{ matrix.allow_failure == 'true' }}

    # Prevent execution on forks (no upload tokens, no Anaconda access).
    # NOTE: the target_python dispatch filter (added below) is NOT applied
    # here. GitHub's job-level `if:` only has access to the github, needs,
    # vars, secrets, and inputs contexts — `matrix` is unrecognized at this
    # path even though it works in runs-on:/env:/steps: for the same job.
    # The filter is implemented as a step-level check instead (Step 0 below),
    # where `matrix` is valid.
    if: github.repository == 'scikit-plots/scikit-plots'

    # ── Matrix ──────────────────────────────────────────────────────────────
    #
    # DESIGN: include-only — 7 explicit, correlated rows.
    #
    # Each row defines ALL fields needed to build and upload one wheel
    # combination. No implicit cross-product. No fields inferred at runtime.
    #
    # To ADD a new combination (e.g. a new Pyodide version):
    #   1. Consult the compatibility table in the file header.
    #   2. Add a new `- python / pyodide_version / ... ` block below.
    #   3. Verify which cibuildwheel series produces the correct wheel tag.
    #   4. Set pypi_ok based on the compatibility table.
    #
    # To REMOVE a combination: delete the corresponding include block.
    #
    # Fields:
    #   python           CPython tag passed to CIBW_BUILD (e.g. "cp312")
    #   pyodide_version  Pyodide SDK target (drives cibw_series selection)
    #   build_platform   GitHub-hosted runner label
    #                    ubuntu-22.04 → stable GLIBC for Pyodide ≤ 0.29.x
    #                    ubuntu-24.04 → newer toolchain for Pyodide 314.x / cp314
    #   cibw_series      "v3" or "v4" — selects the guarded build step below
    #   cibw_enable      CIBW_ENABLE value for this combination
    #   whl_tag          Expected wheel platform tag (documentation + artifact name)
    #   pypi_ok          "true" if wheel tag is accepted by PyPI, else "false"
    #   allow_failure    "true" wires continue-on-error: for this row only (see
    #                    "allow_failure semantics" in the file header). "false"
    #                    everywhere except one known-broken-upstream row today.
    #   anaconda_label   Per-Pyodide-version Anaconda.org label SUFFIX (branch
    #                    slug is prefixed at runtime — Step 0b). EVERY row
    #                    uploads here. See "Anaconda.org upload-label
    #                    architecture" note in the file header.
    #   is_latest        "true" for exactly one row per whl_tag — the row that
    #                    ALSO uploads to the default/rollup channel (no
    #                    version suffix). "false" rows upload ONLY to their
    #                    anaconda_label slot. See file header note.
    #
    strategy:
      fail-fast: false  # Build all valid combinations even if one fails

      matrix:
        include:

          # ── Pyodide 0.28.3 — cibuildwheel v3 ─────────────────────────────
          # Produces: pyodide_2024_0_wasm32 / pyodide_2025_0_wasm32
          # NOT accepted by PyPI. Upload to Anaconda.org staging only.
          # is_latest: "false" — superseded by 0.29.4 below. Uploads ONLY to
          # its own version-pinned label; never touches the default/rollup
          # channel (see "Anaconda.org upload-label architecture" note).
          # ──────────────────────────────────────────────────────────────────

          - python:          "cp312"
            pyodide_version: "0.28.3"
            build_platform:  "ubuntu-22.04"
            cibw_series:     "v3"
            cibw_enable:     "pypy-eol"
            whl_tag:         "pyodide_2024_0_wasm32"
            pypi_ok:         "false"
            allow_failure:   "false"
            anaconda_label:  "pyodide-0.28.3"
            is_latest:       "false"

          - python:          "cp313"
            pyodide_version: "0.28.3"
            build_platform:  "ubuntu-22.04"
            cibw_series:     "v3"
            cibw_enable:     "pypy-eol"
            whl_tag:         "pyodide_2025_0_wasm32"
            pypi_ok:         "false"
            allow_failure:   "false"
            anaconda_label:  "pyodide-0.28.3"
            is_latest:       "false"

          # ── Pyodide 0.29.4 — cibuildwheel v3 ─────────────────────────────
          # Produces: pyodide_2024_0_wasm32 / pyodide_2025_0_wasm32
          # NOT accepted by PyPI. Upload to Anaconda.org staging only.
          # is_latest: "true" — the newest Pyodide ≤0.29.x SDK. ALSO uploads
          # to the default/rollup channel (in addition to its own
          # version-pinned label) so a plain, unlabeled install resolves here
          # rather than to the superseded 0.28.3 build.
          # ──────────────────────────────────────────────────────────────────

          - python:          "cp312"
            pyodide_version: "0.29.4"
            build_platform:  "ubuntu-22.04"
            cibw_series:     "v3"
            cibw_enable:     "pypy-eol"
            whl_tag:         "pyodide_2024_0_wasm32"
            pypi_ok:         "false"
            allow_failure:   "false"
            anaconda_label:  "pyodide-0.29.4"
            is_latest:       "true"

          - python:          "cp313"
            pyodide_version: "0.29.4"
            build_platform:  "ubuntu-22.04"
            cibw_series:     "v3"
            cibw_enable:     "pypy-eol"
            whl_tag:         "pyodide_2025_0_wasm32"
            pypi_ok:         "false"
            allow_failure:   "false"
            anaconda_label:  "pyodide-0.29.4"
            is_latest:       "true"

          # ── Pyodide 314.0.0 — cibuildwheel v4 ────────────────────────────
          # Produces: pyemscripten_2024/2025/2026_0_wasm32
          # cp312: pyodide-eol required, but fails further downstream on an
          #        upstream xbuildenv bug — see header note. allow_failure=true.
          # cp313, cp314: default flags → accepted by PyPI ✅
          # is_latest: "true" for all three — 314.0.0 is currently the ONLY
          # Pyodide 314.x build, so it is trivially the latest in its own
          # whl_tag family. Each ALSO uploads to the default/rollup channel.
          # ──────────────────────────────────────────────────────────────────

          # Has header "Python.h" with dependency python-3.12: NO
          - python:          "cp312"
            pyodide_version: "314.0.0"
            build_platform:  "ubuntu-24.04"
            cibw_series:     "v4"
            cibw_enable:     "pypy-eol pyodide-eol"
            whl_tag:         "pyemscripten_2024_0_wasm32"
            pypi_ok:         "false"
            allow_failure:   "true"   # known upstream xbuildenv bug — see header note
            anaconda_label:  "pyemscripten-314.0.0"
            is_latest:       "true"

          - python:          "cp313"
            pyodide_version: "314.0.0"
            build_platform:  "ubuntu-24.04"
            cibw_series:     "v4"
            cibw_enable:     "pypy-eol"
            whl_tag:         "pyemscripten_2025_0_wasm32"
            pypi_ok:         "true"
            allow_failure:   "false"
            anaconda_label:  "pyemscripten-314.0.0"
            is_latest:       "true"

          - python:          "cp314"
            pyodide_version: "314.0.0"
            build_platform:  "ubuntu-24.04"
            cibw_series:     "v4"
            cibw_enable:     "pypy-eol"
            whl_tag:         "pyemscripten_2026_0_wasm32"
            pypi_ok:         "true"
            allow_failure:   "false"
            anaconda_label:  "pyemscripten-314.0.0"
            is_latest:       "true"


    permissions:
      contents: read  # Redeclared at job level (defense in depth)

    # ── GitHub Environment (zizmor: secrets-outside-env, Medium) ──────────────
    #
    # WHAT THIS FIXES: SKPLT_STAGING_UPLOAD_TOKEN(_NIGHTLY) were referenced via
    # `secrets.*` with no `environment:` on the job. zizmor flags that because
    # there's no approval boundary around secret access — anyone who can run
    # this workflow gets the token, with no option to require reviewers first.
    #
    # WHAT CHANGES RIGHT NOW: nothing behaviorally. If an Environment named
    # "anaconda-publish" doesn't exist yet in repo Settings → Environments,
    # GitHub auto-creates it on first run with NO protection rules — this job
    # keeps working exactly as before, and your existing repository-level
    # secrets remain readable (environment scoping is additive, it doesn't
    # revoke repo-level secret access).
    #
    # WHAT YOU CAN DO LATER (manual, in repo Settings — not in this file):
    #   - Add required reviewers to "anaconda-publish" to gate uploads on a
    #     human approval before the job's secrets become readable.
    #   - Optionally move SKPLT_STAGING_UPLOAD_TOKEN(_NIGHTLY) into this
    #     Environment's own secret store instead of repo-level secrets.
    #   - Add a deployment branch policy to restrict which branches/refs may
    #     dispatch this workflow with upload intent.
    #
    # NOTE: one Environment currently covers BOTH staging channels (stable +
    # nightly). If you want separate approval rules per channel, that needs
    # two Environments and a dynamic `environment: ${{ ... }}` name — left
    # out here because GH Actions' support for expressions in `environment:`
    # has had inconsistent behavior across contexts; a static name is the
    # version that's guaranteed to validate. Ask if you want that split.
    #
    environment:
      name: anaconda-publish


    env:
      # IS_PUSH: true when the user explicitly selects the stable staging channel
      # via workflow_dispatch. Used by upload_wheels.sh to pick the right token.
      IS_PUSH: >-
        ${{ github.event.inputs.anaconda_staging == 'scikit-plots-wheels-staging' }}

      # IS_SCHEDULE_DISPATCH: true for both scheduled and manual runs.
      # Gating upload on this prevents accidental uploads from PR/push events
      # if the pull_request trigger is re-enabled in the future.
      IS_SCHEDULE_DISPATCH: >-
        ${{
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule'
        }}


    steps:

      # ── Step 0: Resolve target_python filter ────────────────────────────────
      #
      # WHY a dedicated step instead of the job-level `if:`: GitHub's
      # job-level `if:` does not have access to the `matrix` context (only
      # github/needs/vars/secrets/inputs — confirmed by an actual workflow
      # validation error, not assumed). `matrix` IS valid in a step's `env:`,
      # so the comparison happens here and the result is published as
      # env.ROW_SELECTED for every later step to gate on.
      #
      # On schedule runs (or any non-dispatch trigger), ROW_SELECTED is
      # always 'true' — the target_python input only exists for
      # workflow_dispatch, so this filter is a no-op outside manual runs.
      #
      - name: "🎯 Resolve target_python filter"
        env:
          MX_PYTHON:     ${{ matrix.python }}
          EVENT_NAME:    ${{ github.event_name }}
          TARGET_PYTHON: ${{ github.event.inputs.target_python }}
        run: |
          if [[ "$EVENT_NAME" != "workflow_dispatch" || -z "$TARGET_PYTHON" || "$TARGET_PYTHON" == "all" || "$TARGET_PYTHON" == "$MX_PYTHON" ]]; then
            echo "ROW_SELECTED=true" >> "$GITHUB_ENV"
          else
            echo "ROW_SELECTED=false" >> "$GITHUB_ENV"
            echo "::notice::Skipping $MX_PYTHON row — target_python dispatch input is set to '$TARGET_PYTHON'."
          fi


      # ── Step 0b: Resolve Anaconda upload labels ───────────────────────────
      #
      # WHY here (before Step 1's validation, after Step 0's filter):
      #   Computed ONCE per job and exported via $GITHUB_ENV so every later
      #   step (the Step 2 summary AND the Step 8 upload) reads the exact same
      #   resolved strings — no duplicated branch-sanitization logic, no risk
      #   of the summary showing one label while the upload uses another.
      #
      # WHAT THIS COMPUTES — see "Anaconda.org upload-label architecture" in
      #   the file header for the full rationale:
      #
      #   BRANCH_SLUG             github.ref_name, sanitized to characters
      #                            safe for an Anaconda.org label (branch
      #                            names like "maintenance/1.0.x" contain '/',
      #                            which is not safe to use as-is).
      #
      #   ANACONDA_VERSION_LABEL  "${BRANCH_SLUG}-${matrix.anaconda_label}" —
      #                            e.g. "main-pyodide-0.29.4". EVERY row
      #                            uploads here, unconditionally (Step 8).
      #
      #   ANACONDA_DEFAULT_LABEL  Empty string on the production branch
      #                            ("main") — Step 8 then omits --label
      #                            entirely, identical to this workflow's
      #                            upload before this redesign. On any other
      #                            branch: equals BRANCH_SLUG alone (no
      #                            version suffix) — a per-branch rollup label
      #                            that never touches the real "main" channel.
      #                            Only consumed when matrix.is_latest == "true".
      #
      - name: "🏷️ Resolve Anaconda upload labels"
        if: env.ROW_SELECTED == 'true'
        env:
          MX_ANACONDA_LABEL: ${{ matrix.anaconda_label }}
          MX_IS_LATEST:      ${{ matrix.is_latest }}
          RAW_REF_NAME:      ${{ github.ref_name }}
          DEFAULT_BRANCH:    "main"  # this repo's production branch name
        run: |
          # Sanitize to [A-Za-z0-9._-] only, collapse repeated '-', and trim
          # leading/trailing '-'. Covers branch names containing '/' (e.g.
          # "maintenance/1.0.x") or other characters unsafe for a label.
          BRANCH_SLUG=$(printf '%s' "$RAW_REF_NAME" \
            | tr -c 'A-Za-z0-9._-' '-' \
            | sed -E 's/-+/-/g; s/^-+//; s/-+$//')
          if [[ -z "$BRANCH_SLUG" ]]; then
            BRANCH_SLUG="unknown-ref"
          fi

          ANACONDA_VERSION_LABEL="${BRANCH_SLUG}-${MX_ANACONDA_LABEL}"

          if [[ "$BRANCH_SLUG" == "$DEFAULT_BRANCH" ]]; then
            ANACONDA_DEFAULT_LABEL=""
          else
            ANACONDA_DEFAULT_LABEL="$BRANCH_SLUG"
          fi

          {
            echo "BRANCH_SLUG=$BRANCH_SLUG"
            echo "ANACONDA_VERSION_LABEL=$ANACONDA_VERSION_LABEL"
            echo "ANACONDA_DEFAULT_LABEL=$ANACONDA_DEFAULT_LABEL"
          } >> "$GITHUB_ENV"

          echo "Resolved — version-pinned label: '$ANACONDA_VERSION_LABEL' | default/rollup: '${ANACONDA_DEFAULT_LABEL:-<unlabeled main>}' (is_latest=$MX_IS_LATEST)"


      # ── Step 1: Validate matrix row invariants ──────────────────────────────
      #
      # WHY: the compatibility table in this file's header and the actual
      # `matrix.include` rows are two separately hand-maintained sources of
      # truth — nothing previously checked that they agree. Rather than try
      # to parse the markdown comment table (fragile, since comments aren't
      # structured data), this asserts the real invariants directly against
      # each row's fields, so a future typo'd row (e.g. cibw_series: v3 paired
      # with a pyemscripten_* tag, or pypi_ok: true alongside the
      # pyodide-eol flag) fails the job immediately instead of silently
      # producing a mistagged wheel.
      #
      - name: "✅ Validate matrix row invariants"
        env:
          MX_CIBW_SERIES:   ${{ matrix.cibw_series }}
          MX_WHL_TAG:       ${{ matrix.whl_tag }}
          MX_PYPI_OK:       ${{ matrix.pypi_ok }}
          MX_CIBW_ENABLE:   ${{ matrix.cibw_enable }}
          MX_ALLOW_FAILURE: ${{ matrix.allow_failure }}
          MX_ANACONDA_LABEL: ${{ matrix.anaconda_label }}
          MX_IS_LATEST:      ${{ matrix.is_latest }}
        run: |
          fail=0
          case "$MX_CIBW_SERIES" in
            v3)
              if [[ "$MX_WHL_TAG" != pyodide_* ]]; then
                echo "::error::cibw_series=v3 must produce a pyodide_* wheel tag, got '$MX_WHL_TAG'"
                fail=1
              fi
              if [[ "$MX_CIBW_ENABLE" == *pyodide-eol* ]]; then
                echo "::error::cibw_series=v3 (cibuildwheel 3.4.1) has no 'pyodide-eol' enable group — it was added in cibuildwheel 4.x. Remove it from this row's cibw_enable (confirmed 2026-06-21 by direct inspection of cibuildwheel/selector.py for both pinned versions)."
                fail=1
              fi
              if [[ "$MX_ANACONDA_LABEL" != pyodide-* ]]; then
                echo "::error::cibw_series=v3 rows must use an anaconda_label starting with 'pyodide-' (e.g. 'pyodide-0.29.4'), got '$MX_ANACONDA_LABEL'"
                fail=1
              fi
              ;;
            v4)
              if [[ "$MX_WHL_TAG" != pyemscripten_* ]]; then
                echo "::error::cibw_series=v4 must produce a pyemscripten_* wheel tag, got '$MX_WHL_TAG'"
                fail=1
              fi
              if [[ "$MX_ANACONDA_LABEL" != pyemscripten-* ]]; then
                echo "::error::cibw_series=v4 rows must use an anaconda_label starting with 'pyemscripten-' (e.g. 'pyemscripten-314.0.0'), got '$MX_ANACONDA_LABEL'"
                fail=1
              fi
              ;;
            *)
              echo "::error::Unknown cibw_series '$MX_CIBW_SERIES' — only 'v3' and 'v4' have a guarded build step. Check this matrix row for a typo."
              fail=1
              ;;
          esac
          if [[ "$MX_PYPI_OK" == "true" && "$MX_CIBW_ENABLE" == *pyodide-eol* ]]; then
            echo "::error::pypi_ok=true but cibw_enable contains 'pyodide-eol', which always produces a non-PyPI tag — these two fields contradict each other on this row."
            fail=1
          fi
          if [[ "$MX_ALLOW_FAILURE" != "true" && "$MX_ALLOW_FAILURE" != "false" ]]; then
            echo "::error::allow_failure must be exactly 'true' or 'false', got '$MX_ALLOW_FAILURE' — check this matrix row for a typo."
            fail=1
          fi
          if [[ "$MX_IS_LATEST" != "true" && "$MX_IS_LATEST" != "false" ]]; then
            echo "::error::is_latest must be exactly 'true' or 'false', got '$MX_IS_LATEST' — check this matrix row for a typo."
            fail=1
          fi
          if [[ -z "$MX_ANACONDA_LABEL" ]]; then
            echo "::error::anaconda_label must not be empty — every row needs a version-pinned upload slot."
            fail=1
          fi
          if [[ "$MX_ANACONDA_LABEL" =~ [[:space:]/] ]]; then
            echo "::error::anaconda_label must not contain whitespace or '/' — got '$MX_ANACONDA_LABEL'. Use hyphens (e.g. 'pyodide-0.28.3')."
            fail=1
          fi
          exit "$fail"


      # ── Step 2: Matrix context summary ──────────────────────────────────────
      #
      # WHY first (after validation): this step always runs (even if later
      # steps fail) and writes a markdown table to the GitHub Step Summary.
      # Engineers triaging a failure see the full build context without
      # opening raw logs.
      #
      - name: "📋 Matrix context & build plan"
        # SECURITY: every `${{ }}` value used to be spliced directly into this
        # run: script (zizmor: template-injection, High confidence on the
        # workflow_dispatch input). GitHub Actions performs that splice as a
        # literal text substitution *before* bash parses the script, so a
        # crafted value containing `$(...)`, backticks, or `"` could break out
        # of the quoted context and execute as code — regardless of whether
        # the field is currently constrained to a `type: choice` dropdown.
        # Routing every value through `env:` instead means bash only ever
        # sees a static script; the dynamic data arrives as inert process
        # environment variables, referenced with quoted "$VAR" expansion.
        env:
          MX_PYTHON:         ${{ matrix.python }}
          MX_PYODIDE:        ${{ matrix.pyodide_version }}
          MX_RUNNER:         ${{ matrix.build_platform }}
          MX_CIBW_SERIES:    ${{ matrix.cibw_series }}
          MX_CIBW_ENABLE:    ${{ matrix.cibw_enable }}
          MX_WHL_TAG:        ${{ matrix.whl_tag }}
          MX_PYPI_OK:        ${{ matrix.pypi_ok }}
          MX_ALLOW_FAILURE:  ${{ matrix.allow_failure }}
          MX_IS_LATEST:      ${{ matrix.is_latest }}
          MX_UPLOAD_CHANNEL: ${{ github.event.inputs.anaconda_staging || 'scikit-plots-wheels-staging-nightly' }}
        run: |
          {
            echo "## 🏗️ Build context — \`$MX_PYTHON\` × Pyodide v$MX_PYODIDE"
            echo ""
            echo "| Parameter       | Value |"
            echo "| --------------- | ----- |"
            echo "| **Python**      | \`$MX_PYTHON\` |"
            echo "| **Pyodide**     | \`v$MX_PYODIDE\` |"
            echo "| **Runner**      | \`$MX_RUNNER\` |"
            echo "| **CIBW series** | \`cibuildwheel $MX_CIBW_SERIES\` |"
            echo "| **CIBW_BUILD**  | \`${MX_PYTHON}-*\` |"
            echo "| **CIBW_ENABLE** | \`$MX_CIBW_ENABLE\` |"
            echo "| **Wheel tag**   | \`$MX_WHL_TAG\` |"
            if [[ "$MX_PYPI_OK" == "true" ]]; then
              echo "| **PyPI OK**     | ✅ Yes |"
            else
              echo "| **PyPI OK**     | ❌ No — Anaconda.org staging only |"
            fi
            if [[ "$MX_ALLOW_FAILURE" == "true" ]]; then
              echo "| **Allowed to fail** | ⚠️ Yes — known upstream issue, see file header. A red build here will NOT fail this workflow run. |"
            fi
            echo "| **Upload channel** | \`$MX_UPLOAD_CHANNEL\` |"
            echo "| **Anaconda label (version-pinned)** | \`$ANACONDA_VERSION_LABEL\` — always uploaded |"
            if [[ "$MX_IS_LATEST" == "true" ]]; then
              if [[ -n "${ANACONDA_DEFAULT_LABEL:-}" ]]; then
                echo "| **Anaconda label (default/rollup)** | \`$ANACONDA_DEFAULT_LABEL\` — also uploaded (is_latest=true, branch \`$BRANCH_SLUG\`) |"
              else
                echo "| **Anaconda label (default/rollup)** | unlabeled \`main\` channel — also uploaded (is_latest=true, production branch) |"
              fi
            else
              echo "| **Anaconda label (default/rollup)** | — skipped (is_latest=false; superseded version, version-pinned label only) |"
            fi
            echo ""
            echo "> Exactly **one** build step executes per job:"
            echo "> CIBW v3 → Pyodide ≤ 0.29.x (\`pyodide_\` prefix),"
            echo "> CIBW v4 → Pyodide 314.x (\`pyemscripten_\` prefix)."
          } >> "$GITHUB_STEP_SUMMARY"


      # ── Step 3: Checkout ──────────────────────────────────────────────────
      #
      # Skipped entirely when this row is filtered out by target_python —
      # no point cloning (with LFS) for a row that won't build.
      #
      - name: "⬇️ Checkout repository"
        if: env.ROW_SELECTED == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false   # No credential leakage via .git/config
          fetch-depth: 0               # Full history for version tags / GitInfo
          lfs: true
          ref: ${{ github.event.pull_request.head.sha || github.ref }}


      # ── Step 3a: Build — cibuildwheel v3 (Pyodide ≤ 0.29.x) ─────────────
      #
      # Runs ONLY when matrix.cibw_series == 'v3'.
      # Produces wheels with `pyodide_{YEAR}_0_wasm32` tag prefix.
      # Target versions: cp312 → pyodide_2024_0, cp313 → pyodide_2025_0
      #
      # NOTE: `uses:` does not support expressions — the action SHA must be a
      # literal string. Two guarded steps is the canonical GitHub Actions pattern
      # for selecting between action versions at runtime.
      #
      - name: "🔨 Build wheel · CIBW v3 · ${{ matrix.python }} × Pyodide v${{ matrix.pyodide_version }}"
        id: build-cibw-v3
        if: matrix.cibw_series == 'v3'
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084  # v3.4.1
        env:
          CIBW_PLATFORM: pyodide
          # Build ONLY the Python version specified in this matrix row.
          # DO NOT use a hardcoded list — that defeats the matrix entirely.
          CIBW_BUILD:   "${{ matrix.python }}-*"
          CIBW_ENABLE:  "${{ matrix.cibw_enable }}"
          # If cibuildwheel v3 adds PYODIDE_VERSION support in a future release,
          # uncomment the line below to pin the exact Pyodide SDK:
          # PYODIDE_VERSION: "${{ matrix.pyodide_version }}"


      # ── Step 3b: Build — cibuildwheel v4 (Pyodide 314.x) ─────────────────
      #
      # Runs ONLY when matrix.cibw_series == 'v4'.
      # Produces wheels with `pyemscripten_{YEAR}_0_wasm32` tag prefix.
      # cp312: pyodide-eol required → ❌ PyPI.
      # cp313: pyemscripten_2025_0 → ✅ PyPI.
      # cp314: pyemscripten_2026_0 → ✅ PyPI.
      #
      - name: "🔨 Build wheel · CIBW v4 · ${{ matrix.python }} × Pyodide v${{ matrix.pyodide_version }}"
        id: build-cibw-v4
        if: matrix.cibw_series == 'v4'
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55  # v4.1.0
        env:
          CIBW_PLATFORM: pyodide
          CIBW_BUILD:   "${{ matrix.python }}-*"
          CIBW_ENABLE:  "${{ matrix.cibw_enable }}"
          # Specify the exact Pyodide SDK version (supported in cibuildwheel v4+):
          # PYODIDE_VERSION: "${{ matrix.pyodide_version }}"


      # ── Step 4: Aggregate build outcome ───────────────────────────────────
      #
      # WHY: every downstream step that needs "did a build succeed" used to
      # repeat `steps.build-cibw-v3.outcome == 'success' ||
      # steps.build-cibw-v4.outcome == 'success'` in its own `if:` (3 copies).
      # Adding a v5 series meant hunting down and editing that condition in
      # every one of those places. This step computes it ONCE into
      # env.BUILD_OK via $GITHUB_ENV; downstream steps just check
      # `env.BUILD_OK == 'true'`. Adding cibw_series v5 later means editing
      # this one condition, not three.
      #
      # This also fails the job loudly — rather than silently staying green —
      # if BOTH guarded build steps were skipped, which only happens when
      # matrix.cibw_series doesn't match 'v3' or 'v4' (a typo'd matrix row).
      #
      - name: "🧮 Aggregate build outcome"
        if: always()
        env:
          OUT_CIBW_V3:    ${{ steps.build-cibw-v3.outcome }}
          OUT_CIBW_V4:    ${{ steps.build-cibw-v4.outcome }}
          MX_CIBW_SERIES: ${{ matrix.cibw_series }}
        run: |
          if [[ "$OUT_CIBW_V3" == "skipped" && "$OUT_CIBW_V4" == "skipped" ]]; then
            echo "::error::No build step ran for cibw_series='$MX_CIBW_SERIES'. Expected 'v3' or 'v4' — check this matrix row for a typo."
            exit 1
          fi
          if [[ "$OUT_CIBW_V3" == "success" || "$OUT_CIBW_V4" == "success" ]]; then
            echo "BUILD_OK=true" >> "$GITHUB_ENV"
          else
            echo "BUILD_OK=false" >> "$GITHUB_ENV"
          fi


      # ── Step 5: Inspect wheelhouse ────────────────────────────────────────
      #
      # Runs even if the build step failed (if: always()) so missing wheels
      # are surfaced explicitly in the step summary rather than silently
      # failing at the upload step.
      #
      - name: "🔍 Inspect wheelhouse"
        if: always()
        run: |
          {
            echo ""
            echo "### 📦 Built wheels"
            echo ""
            if compgen -G "./wheelhouse/*.whl" > /dev/null 2>&1; then
              echo "\`\`\`"
              ls -lh ./wheelhouse/*.whl
              echo "\`\`\`"
            else
              echo "⚠️ **No wheels found** in \`./wheelhouse/\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"


      # ── Step 6: Upload GitHub Actions artifact ────────────────────────────
      #
      # WHY named artifact per combination:
      #   7 parallel jobs all write to the same workflow run. Without a unique
      #   name, the last writer silently overwrites all prior uploads.
      #   Naming convention: wasm32_<python>_pyodide-v<version>_<tag>
      #   e.g.  wasm32_cp313_pyodide-v314.0.0_pyemscripten_2025_0_wasm32
      #
      # WHY no continue-on-error:
      #   A failed artifact upload should surface as a job failure.
      #   The upload condition (env.BUILD_OK, set in Step 4) already handles
      #   partial success.
      #
      - name: "📤 Upload wheels artifact"
        id: artifact-upload
        if: env.BUILD_OK == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: >-
            wasm32_${{ matrix.python }}_pyodide-v${{ matrix.pyodide_version }}_${{ matrix.whl_tag }}
          path: ./wheelhouse/*.whl
          if-no-files-found: warn  # Warn (not error) so the summary step still runs


      # ── Step 7: Setup Miniconda (anaconda-client) ─────────────────────────
      #
      # Only set up Miniconda when:
      #   (a) a build step actually succeeded, AND
      #   (b) this is a scheduled or manually dispatched run (not a stray PR)
      # This avoids needlessly installing Miniconda on dry runs or build failures.
      #
      - name: "🐍 Setup Miniconda (anaconda-client)"
        id: setup-miniconda
        if: >-
          env.BUILD_OK == 'true' &&
          (env.IS_SCHEDULE_DISPATCH == 'true' || env.IS_PUSH == 'true')
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5  # v4.0.1
        with:
          python-version: "3.11"
          show-channel-urls: true
          miniforge-version: latest
          channels: conda-forge,defaults
          channel-priority: strict


      # ── Step 8: Upload to Anaconda.org ────────────────────────────────────
      #
      # WHY always() + explicit step-outcome checks instead of if: success():
      #   success() is unreliable after steps that use continue-on-error.
      #   It also cannot gate on a specific step — it checks the entire job so
      #   far. Checking outcomes directly is deterministic and explicit.
      #
      # WHY two upload_wheels() calls per job — see "Anaconda.org upload-label
      # architecture" in the file header for the full rationale. In short:
      #   1. ALWAYS upload to $ANACONDA_VERSION_LABEL (e.g. "main-pyodide-
      #      0.29.4") — every Pyodide SDK version gets its own permanent,
      #      collision-free slot.
      #   2. ONLY when matrix.is_latest == "true", ALSO upload to
      #      $ANACONDA_DEFAULT_LABEL (empty on the production branch ⇒ no
      #      --label flag ⇒ anaconda-client's true default "main"; on other
      #      branches ⇒ the branch slug alone). This keeps the default/rollup
      #      channel pointing at the freshest wheel ONLY — the superseded
      #      0.28.3 rows (is_latest=false) never touch it, so there is
      #      nothing left for the 0.29.4 upload to silently overwrite there.
      #   Both calls use the same upload_wheels() function from
      #   tools/wheels/upload_wheels.sh — ANACONDA_LABEL is the only thing
      #   that changes between them. Re-exporting it between calls is the
      #   officially documented way to upload the same artifacts to multiple
      #   labels (see that file's upload_wheels() docstring).
      #
      # BACKWARD COMPATIBILITY: upload_wheels.sh's ANACONDA_LABEL support is
      #   purely additive. Any OTHER CI workflow that sources the same script
      #   without setting ANACONDA_LABEL keeps its exact original,
      #   single-unlabeled-upload behavior — confirmed by inspection of the
      #   script: an empty/unset ANACONDA_LABEL produces a byte-identical
      #   `anaconda upload --force -u "$USERNAME" "$artifact"` command to the
      #   one that existed before this field was introduced.
      #
      # Upload destinations (set_upload_vars reads IS_PUSH / IS_SCHEDULE_DISPATCH):
      #   IS_PUSH=true   → https://anaconda.org/scikit-plots-wheels-staging/scikit-plots
      #   IS_PUSH=false  → https://anaconda.org/scikit-plots-wheels-staging-nightly/scikit-plots
      #   …with /label/<ANACONDA_VERSION_LABEL> or /label/<ANACONDA_DEFAULT_LABEL>
      #   appended for the respective upload (omitted entirely for the
      #   unlabeled production-branch default).
      #
      # Tokens were generated at anaconda.org and stored as repository secrets,
      # now scoped under the "anaconda-publish" Environment (see job-level
      # `environment:` above).
      # WARNING: overrides existing wheels on the staging channel when IS_PUSH=true.
      #
      - name: "📥 Upload WASM wheel to Anaconda.org — ${{ matrix.python }} × Pyodide v${{ matrix.pyodide_version }}"
        id: anaconda-upload
        if: >-
          always() &&
          env.BUILD_OK == 'true' &&
          steps.setup-miniconda.outcome == 'success'
        shell: bash -el {0}  # Required for conda environment activation
        env:
          SKPLT_STAGING_UPLOAD_TOKEN:         ${{ secrets.SKPLT_STAGING_UPLOAD_TOKEN }}
          SKPLT_STAGING_UPLOAD_TOKEN_NIGHTLY: ${{ secrets.SKPLT_STAGING_UPLOAD_TOKEN_NIGHTLY }}
          ARTIFACTS_PATH: wheelhouse
          MX_IS_LATEST:   ${{ matrix.is_latest }}
          # ANACONDA_VERSION_LABEL / ANACONDA_DEFAULT_LABEL / BRANCH_SLUG come
          # from Step 0b via $GITHUB_ENV — already plain env vars here, no
          # re-declaration needed.
        run: |
          source tools/wheels/upload_wheels.sh
          set_upload_vars   # Sets TOKEN and USERNAME from IS_PUSH / IS_SCHEDULE_DISPATCH

          upload_failed=0

          echo "── Upload 1/2 — version-pinned label: '${ANACONDA_VERSION_LABEL}' ──"
          export ANACONDA_LABEL="$ANACONDA_VERSION_LABEL"
          upload_wheels || upload_failed=1

          if [[ "$MX_IS_LATEST" == "true" ]]; then
            if [[ -n "${ANACONDA_DEFAULT_LABEL:-}" ]]; then
              echo "── Upload 2/2 — default/rollup label: '${ANACONDA_DEFAULT_LABEL}' (latest Pyodide on branch '${BRANCH_SLUG}') ──"
            else
              echo "── Upload 2/2 — default Anaconda.org channel, no label (latest Pyodide on production branch '${BRANCH_SLUG}') ──"
            fi
            export ANACONDA_LABEL="${ANACONDA_DEFAULT_LABEL:-}"
            upload_wheels || upload_failed=1
          else
            echo "ℹ️  is_latest=false for this row — skipping the default/rollup upload."
            echo "ℹ️  This wheel is intentionally available ONLY under '${ANACONDA_VERSION_LABEL}'."
          fi

          exit "$upload_failed"


      # ── Step 9: Final step-outcome summary ───────────────────────────────
      #
      # Appends a per-step outcome table to the GitHub Step Summary.
      # Always runs so engineers see a complete picture even after failures.
      #
      - name: "📊 Final build status"
        if: always()
        # SECURITY: same template-injection pattern as Step 1 — step outcomes
        # are enum-constrained by GitHub (success/failure/cancelled/skipped),
        # so the realistic risk here was always low, but a static script with
        # env:-sourced data is the uniform, audit-clean pattern for the whole
        # file rather than a special case.
        env:
          OUT_CIBW_V3:   ${{ steps.build-cibw-v3.outcome }}
          OUT_CIBW_V4:   ${{ steps.build-cibw-v4.outcome }}
          OUT_ARTIFACT:  ${{ steps.artifact-upload.outcome }}
          OUT_MINICONDA: ${{ steps.setup-miniconda.outcome }}
          OUT_ANACONDA:  ${{ steps.anaconda-upload.outcome }}
          MX_WHL_TAG:    ${{ matrix.whl_tag }}
        run: |
          {
            echo ""
            echo "## 📊 Step outcomes"
            echo ""
            echo "| Step                   | Outcome |"
            echo "| ---------------------- | ------- |"
            echo "| Build (CIBW v3)        | \`$OUT_CIBW_V3\` |"
            echo "| Build (CIBW v4)        | \`$OUT_CIBW_V4\` |"
            echo "| Artifact upload        | \`$OUT_ARTIFACT\` |"
            echo "| Miniconda setup        | \`$OUT_MINICONDA\` |"
            echo "| Anaconda.org upload    | \`$OUT_ANACONDA\` |"
            echo ""
            if [[ "$OUT_CIBW_V3" == "failure" || "$OUT_CIBW_V4" == "failure" ]]; then
              echo "❌ **Build failed.** Check the build step log above for details."
            elif [[ "$OUT_CIBW_V3" == "skipped" && "$OUT_CIBW_V4" == "skipped" ]]; then
              echo "⚠️ **Both build steps skipped** — check matrix.cibw_series value."
            else
              echo "✅ **Build succeeded** — \`$MX_WHL_TAG\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
