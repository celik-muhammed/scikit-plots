# https://github.com/manics/action-binderbadge
# https://github.com/jupyterhub/repo2docker-action/blob/master/.github/workflows/binder.yaml
---
name: "yy CI 📘 mybinder.org binder-badge"


on:
  workflow_dispatch: # Allows manual triggering of the workflow


## Top-level default: deny-all. Each job below declares only the scopes
## it actually needs (principle of least privilege). Without this block
## GITHUB_TOKEN falls back to the repository/org default, which is often
## broader than required (OpenSSF Scorecard Token-Permissions: Warn).
permissions: {}


jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      # # - uses: manics/action-binderbadge@main
      # - uses: manics/action-binderbadge@99560b89939071823821e105afc83aaa87927e03  # v3.0.0
      #   with:
      #     githubToken: ${{ secrets.GITHUB_TOKEN }}

    - name: comment on PR with Binder link
      if: github.event == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          var BRANCH_NAME = process.env.BRANCH_NAME;
          github.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `[![Binder](https://mybinder.org/badge_logo.svg)](https://mybinder.org/v2/gh/${context.repo.owner}/${context.repo.repo}/${BRANCH_NAME}) :point_left: Launch a binder notebook on this branch`
          })
      env:
        BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
