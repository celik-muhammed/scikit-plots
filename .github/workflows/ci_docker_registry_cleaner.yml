# .github/workflows/ci_docker_registry_cleaner.yml
#
# ─────────────────────────────────────────────────────────────────────────────
# Docker Registry Storage Management — Delete old image tags after a push.
# ─────────────────────────────────────────────────────────────────────────────
#
# PURPOSE
#   Remove stale image tags from remote registries after every successful
#   multi-arch Docker push.  Keeps storage tidy and tags unambiguous.
#
# TRIGGER MODES
#   1. Automatic (workflow_run): fires when the main build workflow completes
#      successfully.  All parameters fall back to safe defaults.
#   2. Manual   (workflow_dispatch): full parameter control via GitHub UI or CLI.
#
# REGISTRY SUPPORT
#   docker_hub    fully implemented — Docker Hub v2 REST API (JWT auth).
#                 Two-phase cleanup: Phase 1 removes named tags via the Hub
#                 tag endpoint; Phase 2 deletes the underlying manifests by
#                 digest via the Hub REST endpoint:
#                   DELETE hub.docker.com/.../manifests/{digest}
#                 This is the Hub API (hub.docker.com), NOT the OCI
#                 distribution API (registry-1.docker.io) which does reject
#                 DELETE by digest with "UNSUPPORTED" for Docker Hub.
#                 Digests are collected from the /tags response during Phase 1
#                 enumeration; any parent (Image Index) or child (platform
#                 image) manifest whose ALL pointing tags were reclaimed is
#                 deleted in Phase 2.  Now has full parity with GHCR/Quay.
#                 Scope: manifests discovered this run only — pre-existing
#                 untagged digests (orphaned before this run) are not visible
#                 from /tags and are outside Phase 2's reach.
#   github_ghcr   fully implemented  — GitHub Packages API 2022-11-28 (GITHUB_TOKEN)
#   redhat_quay   fully implemented  — Quay.io REST API v1 (Bearer QUAY_ROBOT_TOKEN)
#
# DELETION POLICY
#   A tag is deleted when ALL conditions hold:
#     1. Its push/update timestamp is BEFORE the cutoff date.
#     2. Its name does NOT match any pattern in cleanup_ignore_patterns (POSIX ERE).
#   For GHCR, a manifest version is deleted only when EVERY one of its tags
#   satisfies both conditions above (protects multi-tagged manifests).
#   If a tag has no recorded push timestamp it is KEPT (safe default).
#
# EXPLICIT TAG DELETION (cleanup_explicit_tags)
#   A comma-separated list of tag names to forcibly remove from every target
#   registry, regardless of age or ignore-pattern rules.  Each name is tried
#   independently — missing tags are skipped silently (idempotent).
#   For GHCR, deleting by tag requires locating and deleting the manifest
#   version, which also removes ALL other tags on that digest; this is logged
#   clearly before any action is taken.
#   Explicit deletions honour dry-run mode.
#
# PURGE MODE (cleanup_purge)
#   A "nuclear" sweep for end-of-month storage reclamation and stale-image
#   cleanup.  When enabled, BOTH the age (cutoff) check AND the normal
#   cleanup_ignore_patterns check are bypassed — every tag/version becomes a
#   deletion candidate.  The ONLY survivors are tags matching
#   cleanup_purge_keep_patterns (default: '^latest$'); set that input empty
#   for a total wipe.  Purge is the right tool for the "stale manifest"
#   problem where re-pushing a tag orphans the previous digest.  For GHCR and
#   Quay, untagged manifests carry no tags and are always reclaimed.  For
#   Docker Hub, Phase 2 manifest deletion provides the same guarantee: every
#   manifest whose tags are all reclaimed is then deleted by digest via the
#   Hub REST API.  Purge still honours dry-run mode and remains idempotent
#   (HTTP 400/404 → already gone → not an error).
#   Purge is auto-enabled on the last-day-of-month schedule (see SCHEDULING).
#
# SCHEDULING
#   Two monthly cron triggers (see the schedule: block for the exact strings):
#     • 1st of month 09:00 UTC  → routine cleanup (purge OFF, runs 2 h before builder)
#     • last day      23:00 UTC → purge cleanup   (purge ON)
#   The "last day" cron fires on days 28-31; the resolve step promotes it to a
#   real purge only when tomorrow is the 1st, so it runs exactly once a month.
#   workflow_run is NOT an active trigger; the schedule offsets provide the
#   correct clean-first ordering without the security risk (see zizmor).
#
# CUTOFF DATE
#   cutoff = midnight UTC of (today − cleanup_keep_days)
#   cleanup_keep_days=0 → cutoff is today at 00:00 UTC
#     → tags pushed today (including the ones just pushed) are always kept.
#   cleanup_keep_days=7 → cutoff is 7 days ago at 00:00 UTC
#     → tags from the last 7 days are kept.
#
# SAFETY GUARANTEES
#   • Manual runs (workflow_dispatch) default to dry-run — no deletes unless
#     the operator explicitly sets cleanup_dry_run=false.
#   • Scheduled and post-build (workflow_run) runs execute LIVE by design;
#     this is the unattended maintenance path.  Effective dry-run/purge values
#     are resolved once, up front, by the 'resolve' step and echoed to the log.
#   • Ignore patterns include common blessed tags by default; purge mode keeps
#     only cleanup_purge_keep_patterns.
#   • continue-on-error: true per registry step — one registry failure never
#     blocks cleanup of the remaining registries when target='all'.
#   • Idempotent — running twice produces the same final state.
#   • Fork guard — skipped on forks; cannot touch upstream registry credentials.
#   • Missing credentials exit the step cleanly (skip, no failure).
#
# REFERENCES
#   Docker Hub API v2  : https://docs.docker.com/docker-hub/api/latest/
#   GitHub Packages API: https://docs.github.com/en/rest/packages
#   Quay.io API        : https://docs.quay.io/api/swagger/
# ─────────────────────────────────────────────────────────────────────────────

name: "CI 🐋 Docker Registry 🧹 — Cleanup Old Tags"

on:
  # Run after another workflow finishes → workflow_run
  # workflow_run:
  #   workflows: ["CI 🐋 Docker Registry 🧹 — Cleanup Old Tags"]  # should match
  #   types:
  #     - completed
  # Share logic between workflows → workflow_call
  # workflow_call:  # Mark as Reusable Workflow
  # call-workflow:  # Call a Reusable Workflow
  #   uses: ./.github/workflows/ci_docker_registry_cleaner.yml
  # Trigger conditionally or across repositories → repository_dispatch
  # Start a workflow on demand from another workflow → workflow_dispatch API
  # repository_dispatch:  # Mark as Workflow dispatch
  #   types: [run-ci_docker_registry_cleaner]
  workflow_dispatch: # Allows manual triggering of the workflow
    inputs:
      cleanup_registry:
        description: >-
          Registry target.
          'all'  attempts every registry and ignores individual failures.
          'none' skips cleanup entirely (useful to test build without cleanup).
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - docker_hub
          - github_ghcr
          - redhat_quay
          - none
      cleanup_purge:
        description: >-
          PURGE MODE (nuclear sweep).  When true, BOTH the age cutoff AND the
          cleanup_ignore_patterns checks are bypassed — every tag/manifest is a
          deletion candidate.  Only tags matching cleanup_purge_keep_patterns
          survive.  Use for end-of-month storage reclamation and to clear
          stale/orphaned (untagged) manifests left by re-pushed tags on GHCR
          and Quay.  Still honours dry-run; still idempotent.  Default: false.
        required: false
        type: boolean
        default: false
      cleanup_purge_keep_patterns:
        description: >-
          Comma-separated POSIX ERE patterns (grep -E) that remain protected
          EVEN IN PURGE MODE.  This is the last line of defence so a purge does
          not wipe blessed pointers such as 'latest'.  Untagged manifests match
          no pattern and are therefore always reclaimed.  Set to an empty string
          for a TOTAL wipe (delete absolutely everything).  Ignored when
          cleanup_purge is false.
          Example: ^latest$,^stable$
        required: false
        type: string
        default: '^latest$'
      cleanup_keep_days:
        description: >-
          Retain tags whose push date is on or after midnight UTC of
          (today − N days).  0 = keep today's tags only.  7 = keep last week.
          Integer string, no fractions.
        required: false
        type: string
        default: '0'
      cleanup_ignore_patterns:
        description: >-
          Comma-separated POSIX ERE patterns (grep -E).  Tags matching ANY
          pattern are always preserved regardless of age.  Whitespace around
          commas is stripped automatically.
          Example: ^latest$,^latest-,^main$,^maintenance-,^v[0-9]
        required: false
        type: string
        default: '^latest$,^latest-,^main$,^maintenance-,^v[0-9]'
      cleanup_explicit_tags:
        description: >-
          Comma-separated list of exact tag names to forcibly remove from
          every targeted registry, regardless of age or ignore patterns.
          Tags that are already absent are skipped silently (idempotent).
          For GHCR, deleting a tag removes the entire manifest version and
          ALL other tags sharing that digest — this is logged before acting.
          Honours dry-run mode.  Leave empty to skip explicit deletion.
          Example: dependabot_pip_scipy-openblas64-0.3.33.0.0-6f491e8,old-branch-abc123
        required: false
        type: string
        default: ''
      cleanup_policies:
        description: >-
          Per-tag-pattern retention policies (JSON array, conda-channel style).
          Each entry: { "pattern": "<POSIX ERE>", "keep_days": <int>, "label": "<str>" }.
          First matching policy wins (priority = array order).
          keep_days: -1  → keep forever (never a deletion candidate).
          keep_days: 0   → keep tags pushed today only (same as global default).
          Tags matching no policy fall back to cleanup_keep_days.
          GHCR multi-tag manifests use the most conservative (longest) keep_days
          across all tags on a shared digest so no co-digest tag is accidentally
          removed while another is supposed to be kept.
          Ignored completely when cleanup_purge is true (purge bypasses all policies).
          Leave empty to use the global cleanup_keep_days for every tag (default
          behaviour — fully backward compatible).
          Example (scikit-plots wheel matrix):
            [
              {"pattern":"^Wheel-3\\.9-",  "keep_days":7,  "label":"py39 wheels"},
              {"pattern":"^Wheel-3\\.10-", "keep_days":14, "label":"py310 wheels"},
              {"pattern":"^Wheel-3\\.11-", "keep_days":30, "label":"py311 wheels"},
              {"pattern":"^v[0-9]",        "keep_days":90, "label":"release tags"},
              {"pattern":"^latest$",       "keep_days":-1, "label":"latest pointer"}
            ]
        required: false
        type: string
        default: ''
      cleanup_dry_run:
        description: >-
          Dry run: enumerate candidates and print actions without executing them.
          SAFE DEFAULT is 'true'.  Set to 'false' only when ready to delete.
        required: false
        type: choice
        # defaults to 'true' — no deletes unless explicitly opted in.
        default: 'true'
        options:
          - 'true'
          - 'false'
  # workflow_run:
  #   # Must match the exact 'name:' field in the build workflow exactly.
  #   workflows:
  #     - "CI 🐋 Docker Recommended multi-platform flow (QEMU + Buildx + build-push-action)"
  #   types: [completed]
  schedule:
    ## Automatically built and released every night (or at a regular interval, often nightly)
    ## Cron schedule for automated runs
    ## https://crontab.cronhub.io
    ## https://freeformatter.com/cron-expression-generator-quartz.html#cronexpressionexamples
    ## https://crontab.io/validator
    ## https://cron-checker.com/
    ## "* * * * * * *" 7 fields (Quartz with year)         <second> <minute> <hour> <day of month> <month> <day of week> <year>
    ## "* * * * * *"   6 fields (Quartz / some schedulers) <second> <minute> <hour> <day of month> <month> <day of week>
    ## "* * * * *"     5 fields (standard Unix cron)       <minute> <hour> <day of month> <month> <day of week>
    ##        ┌─────────────────────── minute           (0 - 59)
    ##        │  ┌──────────────────── hour             (0 - 23)
    ##        │  │  ┌───────────────── day of the month (1 - 31)
    ##        │  │  │ ┌─────────────── month            (1 - 12 or JAN-DEC)
    ##        │  │  │ │ ┌───────────── day of the week  (0 - 7 or SUN-SAT)
    ##        │  │  │ │ │
    ## cron: "11 11 * * SUN,WED"  # Runs every Sunday and Wednesday at 11:11 UTC
    # - cron: '11 11 * * *'  # daily
    # - cron: '11 11 * * 1'  # weekly
    ## ── Monthly maintenance schedule ────────────────────────────────────────
    ## These two cron strings MUST stay in sync with ROUTINE_CRON / PURGE_CRON
    ## in the 'resolve' step below, which maps each trigger to its parameters.
    ##
    ##   1st of month, 11:11 UTC  → routine cleanup (purge OFF, live)
    ##   1st of month, 09:00 UTC  → routine cleanup (purge OFF, live)
    ##                              runs 2 h before the builder (11:11 UTC)
    - cron: '0 9 1 * *'        # monthly, 1st of month 09:00 UTC — routine cleanup; 2 h before builder
    ##   days 28-31, 23:00 UTC  → purge candidate; resolve step promotes to real
    ##                           purge ONLY when tomorrow is the 1st (true last day)
    - cron: '0 23 28-31 * *'   # monthly, last day 23:00 UTC — purge sweep


## Workflow-level permissions: minimal (principle of least privilege).
## packages:write is granted at job level only.
# permissions: {}  # Declare default permissions as read only.
permissions:
  contents: read

# ── Concurrency guard (MEDIUM-6) ────────────────────────────────────────────
# The cleaner and the builder are coupled through TIME, not code — the only
# thing preventing a builder run from starting mid-pagination of a cleaner
# run is the 2-hour schedule offset (cleaner 09:00 UTC -> builder 11:11 UTC).
# A manual cleanup_registry dispatch could still overlap an in-progress
# scheduled run (or another manual dispatch), racing on DELETE/GET pagination
# against the same registries. Queue (don't cancel) overlapping runs so a
# half-finished pagination loop is never abandoned mid-flight.
# cancel-in-progress is deliberately false: cancelling a cleanup run partway
# through a DELETE loop is more dangerous than letting it finish and queuing
# the next one — there is no useful "this run is stale, drop it" signal here
# the way there is for, e.g., a build triggered by superseded source code.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false


jobs:
  cleanup_registry:
    name: 🧹 Cleanup old Docker registry tags

    # ── Trigger conditions ──────────────────────────────────────────────────
    # Fork guard: only run on the canonical repository so fork PRs cannot
    # accidentally delete tags from the upstream registries.
    #
    # workflow_dispatch: honour 'none' to allow users to skip cleanup entirely.
    # schedule         : monthly maintenance:
    #                      1st of month 09:00 UTC → routine cleanup (purge OFF)
    #                      last day of month 23:00 UTC → purge sweep (purge ON
    #                        on true last day only; resolve step enforces this).
    if: >-
      github.repository == 'scikit-plots/scikit-plots' &&
      (
        (github.event_name == 'workflow_dispatch' &&
         inputs.cleanup_registry != 'none') ||
        github.event_name == 'schedule'
      )

    runs-on: ubuntu-latest

    permissions:
      packages: write   # Required: delete GHCR package versions via GITHUB_TOKEN.
      contents: read

    env:
      # ── Fixed image coordinates — must stay in sync with ci_docker_image.yml ──
      # DockerHub org  'scikitplot'             (no hyphen — matches Docker Hub account)
      # GHCR org        github.repository_owner (with hyphen — matches GitHub org)
      # QUAY_NAMESPACE  github.repository_owner (same org as GHCR)
      #   → quay.io/${QUAY_NAMESPACE}/${IMAGE_REPO}
      #   → quay.io/scikit-plots/scikit-plots   (mirrors ghcr.io/scikit-plots/scikit-plots)
      IMAGE_NAMESPACE:  scikitplot
      IMAGE_REPO:       scikit-plots
      GHCR_ORG:         ${{ github.repository_owner }}
      QUAY_NAMESPACE:   ${{ github.repository_owner }}

      # ── Cleanup parameters — workflow_dispatch values or safe defaults ────────
      # The '|| default' fallback activates when triggered by schedule
      # (no inputs available) or when the user omits an optional field.
      CLEANUP_TARGET:   ${{ inputs.cleanup_registry          || 'all'  }}
      KEEP_DAYS:        ${{ inputs.cleanup_keep_days         || '0'    }}
      IGNORE_PATTERNS:  ${{ inputs.cleanup_ignore_patterns   || '^latest$,^latest-,^main$,^maintenance-,^v[0-9]' }}
      EXPLICIT_TAGS:    ${{ inputs.cleanup_explicit_tags     || ''     }}
      # Per-tag-pattern retention policies (conda-channel style, JSON array).
      # Empty string → all tags use the global KEEP_DAYS (fully backward compatible).
      CLEANUP_POLICIES: ${{ inputs.cleanup_policies           || ''     }}
      # Patterns that survive even a purge (empty input → total wipe).
      PURGE_KEEP_PATTERNS: ${{ inputs.cleanup_purge_keep_patterns || '^latest$' }}
      # NOTE: DRY_RUN and PURGE are intentionally NOT defined here.  They are
      # trigger-dependent and resolved once by the 'resolve' step, then injected
      # into each registry/summary step via steps.resolve.outputs.* — a single,
      # deterministic source of truth (manual=dry-run by default; scheduled and
      # post-build=live; purge auto-enabled on the last-day-of-month cron).

    steps:

      # ════════════════════════════════════════════════════════════════════════
      # Resolve effective parameters (trigger-aware) — single source of truth
      # ════════════════════════════════════════════════════════════════════════
      # GitHub Actions cannot run date logic inside `env:`/`if:` expressions, so
      # the mapping "which trigger → which behaviour" lives here, runs once, and
      # is exported as step outputs consumed by every downstream step:
      #   • dry_run       — manual runs default to dry-run; scheduled & post-build
      #                     runs are live.  Manual operators can still override.
      #   • purge         — true only on the last-day-of-month cron (or when the
      #                     operator ticks cleanup_purge on a manual run).
      #   • run_cleanup   — false when the 28-31 purge cron fires on a NON-last
      #                     day (so the job no-ops instead of running an
      #                     off-schedule sweep); true otherwise.
      #   • today_midnight — (SUPP-3) midnight UTC of "today", computed ONCE
      #                     here and reused by every registry step as the
      #                     cutoff base.  Each registry step previously called
      #                     `date -u +%Y-%m-%dT00:00:00Z` independently; a run
      #                     straddling a UTC-midnight rollover could then see
      #                     three DIFFERENT "today" values across DH/GHCR/Quay,
      #                     silently shifting each registry's cutoff by a day
      #                     relative to the others. One value, one source of
      #                     truth, shared by all three.
      # This step is also (NEW-A + MEDIUM-5) the single validation point for
      # KEEP_DAYS and CLEANUP_POLICIES. Both were previously re-validated
      # identically in the DH/GHCR/Quay steps — three copies of the same guard
      # that only matters once: a bad value still wouldn't be caught until
      # whichever registry step happened to run first, and a registry step
      # that's skipped this run (cleanup_registry != 'all') would never see
      # the check at all. Failing fast here means one bad input aborts the
      # whole job before any step (let alone any destructive call) runs.
      # Outputs (not $GITHUB_ENV) are used so they are usable in later `if:`.
      - name: 🧭 Resolve effective parameters
        id: resolve
        shell: bash
        env:
          EVENT_NAME:   ${{ github.event_name }}
          SCHED_CRON:   ${{ github.event.schedule }}
          IN_PURGE:     ${{ inputs.cleanup_purge }}
          IN_DRY_RUN:   ${{ inputs.cleanup_dry_run }}
          # MUST match the cron strings in the schedule: block above.
          ROUTINE_CRON: '0 9 1 * *'    # 1st of month — MUST stay in sync with schedule: block above
          PURGE_CRON:   '0 23 28-31 * *'  # monthly
          # KEEP_DAYS / CLEANUP_POLICIES are already job-level `env:` (see the
          # job's env: block above) and so are already real shell variables in
          # this step without being re-listed here; declared explicitly anyway
          # for readability at the point of use.
          KEEP_DAYS:        ${{ env.KEEP_DAYS }}
          CLEANUP_POLICIES: ${{ env.CLEANUP_POLICIES }}
        run: |
          set -Eeuo pipefail

          # ── Validate KEEP_DAYS once for the whole job (NEW-A) ────────────────
          if ! [[ "${KEEP_DAYS}" =~ ^[0-9]+$ ]]; then
            echo "❌ cleanup_keep_days must be a non-negative integer; got: '${KEEP_DAYS}'" >&2
            exit 1
          fi

          # ── Validate CLEANUP_POLICIES once for the whole job (MEDIUM-5) ──────
          # Must be a JSON array; malformed JSON is a hard error (fail fast so
          # the operator discovers the typo before any destructive action is
          # taken). Each element is validated explicitly — no silent coercion
          # of bad shapes — per the "validate all inputs and assumptions" rule.
          # 'pattern' must be a non-empty string; 'keep_days' must be an
          # integer >= -1. 'label' is optional/free-form, not validated beyond
          # the array-of-objects shape check below.
          if [[ -n "${CLEANUP_POLICIES:-}" ]]; then
            if ! printf '%s' "${CLEANUP_POLICIES}" | jq -e 'type == "array"' > /dev/null 2>&1; then
              echo "❌ cleanup_policies must be a valid JSON array." >&2
              echo "   Got: '${CLEANUP_POLICIES:0:120}'" >&2
              exit 1
            fi
            if ! printf '%s' "${CLEANUP_POLICIES}" | jq -e '
                  all(.[]?;
                    (.pattern | type == "string" and length > 0) and
                    (.keep_days | type == "number" and (. == floor) and . >= -1)
                  )' > /dev/null 2>&1; then
              echo "❌ cleanup_policies has a malformed entry." >&2
              echo "   Each entry needs: {\"pattern\":\"<non-empty POSIX ERE>\",\"keep_days\":<int >= -1>}" >&2
              echo "   Got: '${CLEANUP_POLICIES:0:200}'" >&2
              exit 1
            fi
          fi

          # ── Centralised cutoff base (SUPP-3) ─────────────────────────────────
          # Every registry step derives its cutoff from these values instead
          # of computing its own "now", ensuring the comparison baseline is
          # identical even if the run straddles midnight.
          TODAY_MIDNIGHT="$(date -u +%Y-%m-%dT00:00:00Z)"
          CUTOFF_EPOCH=$(date -u -d "${TODAY_MIDNIGHT} - ${KEEP_DAYS} days" +%s)
          CUTOFF_DATE=$(date -u -d "@${CUTOFF_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)

          purge='false'
          dry_run='false'
          run_cleanup='true'
          reason=''

          case "${EVENT_NAME}" in
            workflow_dispatch)
              # Manual: honour inputs; default to the SAFE dry-run path.
              purge="${IN_PURGE:-false}"
              dry_run="${IN_DRY_RUN:-true}"
              reason="manual workflow_dispatch (purge=${purge}, dry_run=${dry_run})"
              ;;
            workflow_run)
              # Kept as a safe fallback: workflow_run is not an active trigger
              # but if it were re-enabled it would behave sensibly here.
              dry_run='false'
              reason='post-build workflow_run (live, no purge) [INACTIVE TRIGGER]'
              ;;
            schedule)
              # Scheduled maintenance: live.
              dry_run='false'
              case "${SCHED_CRON}" in
                "${ROUTINE_CRON}")
                  reason='monthly routine cleanup — 1st of month (no purge)'
                  ;;
                "${PURGE_CRON}")
                  # Promote to purge ONLY on the true last day of the month,
                  # detected by 'tomorrow is the 1st'.  date math is UTC to
                  # match the cutoff computation in the registry steps.
                  if [[ "$(date -u -d 'tomorrow' +%d)" == '01' ]]; then
                    purge='true'
                    reason="monthly PURGE — last day of month ($(date -u +%Y-%m-%d))"
                  else
                    run_cleanup='false'
                    reason="purge cron fired on non-last day ($(date -u +%Y-%m-%d)); no-op"
                  fi
                  ;;
                *)
                  reason="unrecognised schedule cron '${SCHED_CRON}'; defaulting to routine cleanup"
                  ;;
              esac
              ;;
            *)
              reason="unhandled event '${EVENT_NAME}'; defaulting to dry-run"
              dry_run='true'
              ;;
          esac

          {
            echo "purge=${purge}"
            echo "dry_run=${dry_run}"
            echo "run_cleanup=${run_cleanup}"
            echo "today_midnight=${TODAY_MIDNIGHT}"
            echo "cutoff_epoch=${CUTOFF_EPOCH}"
            echo "cutoff_date=${CUTOFF_DATE}"
          } >> "${GITHUB_OUTPUT}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "🧭  Resolved cleanup parameters"
          echo "    Trigger     : ${EVENT_NAME}${SCHED_CRON:+ (cron: ${SCHED_CRON})}"
          echo "    Decision    : ${reason}"
          echo "    run_cleanup : ${run_cleanup}"
          echo "    purge       : ${purge}"
          echo "    dry_run     : ${dry_run}"
          echo "    today (UTC) : ${TODAY_MIDNIGHT}"
          echo "    cutoff (UTC): ${CUTOFF_DATE} (epoch ${CUTOFF_EPOCH})"
          echo "═══════════════════════════════════════════════════════════════"
          if [[ "${purge}" == 'true' && "${dry_run}" != 'true' ]]; then
            echo "::warning::PURGE MODE (LIVE) — age and ignore-pattern filters are bypassed; only PURGE_KEEP_PATTERNS survive."
          fi

      # ════════════════════════════════════════════════════════════════════════
      # Docker Hub
      # ════════════════════════════════════════════════════════════════════════
      - name: 🧹 Cleanup old tags — Docker Hub
        id: cleanup_dockerhub
        # Step runs when cleanup is active AND target is 'all' or 'docker_hub'.
        if: >-
          steps.resolve.outputs.run_cleanup == 'true' &&
          (env.CLEANUP_TARGET == 'all' || env.CLEANUP_TARGET == 'docker_hub')
        # continue-on-error: isolates this registry's failure from others in
        # 'all' mode; the job outcome is still reported in the summary step.
        continue-on-error: true
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
          DRY_RUN:            ${{ steps.resolve.outputs.dry_run }}
          PURGE:              ${{ steps.resolve.outputs.purge }}
          # (SUPP-3) Consumed from the resolve step's single source of truth
          # instead of each registry step computing its own "today"/cutoff —
          # see the resolve step for why that mattered.
          TODAY_MIDNIGHT:     ${{ steps.resolve.outputs.today_midnight }}
          CUTOFF_EPOCH:       ${{ steps.resolve.outputs.cutoff_epoch }}
          CUTOFF_DATE:        ${{ steps.resolve.outputs.cutoff_date }}
        run: |
          set -Eeuo pipefail

          echo "═══════════════════════════════════════════════════════════════"
          echo "🐳  Docker Hub cleanup"
          echo "    Image      : ${IMAGE_NAMESPACE}/${IMAGE_REPO}"
          echo "    Keep days  : ${KEEP_DAYS}"
          echo "    Dry run    : ${DRY_RUN}"
          echo "    Purge      : ${PURGE}"
          echo "    Ignore     : ${IGNORE_PATTERNS}"
          echo "    Explicit   : ${EXPLICIT_TAGS:-<none>}"
          echo "    Cutoff     : ${CUTOFF_DATE} (epoch ${CUTOFF_EPOCH}) [global default]"
          echo "═══════════════════════════════════════════════════════════════"

          # ── Guard: credentials required ─────────────────────────────────────
          # Docker Hub requires explicit username + token (unlike GHCR which uses
          # the auto-provisioned GITHUB_TOKEN).  Warn and exit cleanly so the job
          # step is marked 'success' — this is expected on forks and fresh repos.
          if [[ -z "${DOCKERHUB_USERNAME:-}" || -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "⚠️  DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not set." >&2
            echo "   Docker Hub cleanup skipped (credentials absent)." >&2
            exit 0
          fi

          # KEEP_DAYS and CLEANUP_POLICIES are validated exactly once, in the
          # 'resolve' step (NEW-A, MEDIUM-5) — that step has no
          # continue-on-error, so an invalid value aborts the whole job before
          # any registry step (this one included) ever runs. Re-validating here
          # would be dead code: it could never fire with an input that didn't
          # already fail resolve first.

          # ── Rate-limit / retry tuning (LOW-1) ────────────────────────────────
          # Single named constants instead of a magic "sleep 0.3" repeated at
          # every call site — easier to tune, and the intent ("respect Docker
          # Hub's API rate limit") is visible at the definition instead of only
          # in a comment next to one of several copies.
          readonly API_DELETE_DELAY_SECONDS="0.3"
          readonly MAX_DELETE_RETRIES=3
          readonly RETRY_BASE_DELAY_SECONDS=1

          POLICY_COUNT=0
          if [[ -n "${CLEANUP_POLICIES:-}" ]]; then
            POLICY_COUNT=$(printf '%s' "${CLEANUP_POLICIES}" | jq 'length')
            echo "    Policies   : ${POLICY_COUNT} per-tag retention policy/ies active"
          else
            echo "    Policies   : none (all tags use global keep_days=${KEEP_DAYS}d)"
          fi

          # ── Helper: resolve the effective keep_days for one tag name ────────
          # First matching policy in CLEANUP_POLICIES wins (array order =
          # priority); no match falls back to the global KEEP_DAYS.
          # Reads (besides its argument): POLICY_COUNT, CLEANUP_POLICIES,
          # KEEP_DAYS from the step scope (NEW-C — previously undocumented).
          # Pure with respect to side effects: no globals modified, no network
          # calls, safe to call repeatedly per tag.
          get_policy_keep_days() {
            local tag="$1"
            [[ "${POLICY_COUNT}" -eq 0 ]] && { echo "${KEEP_DAYS}"; return 0; }
            local result
            # (SUPP-1) `.pattern` must be read from the policy object *before*
            # the pipe hands `.` over to the tag string, otherwise `test(.pattern)`
            # tries to index the tag string itself and jq errors with "Cannot
            # index string with string \"pattern\"" the first time a policy is
            # actually supplied. Binding `.pattern` to $p up front fixes this.
            result=$(printf '%s' "${CLEANUP_POLICIES}" | jq -r --arg tag "${tag}" '
              [ .[] | select(.pattern as $p | ($tag | test($p))) ] | .[0].keep_days // empty
            ')
            if [[ -z "${result}" ]]; then
              echo "${KEEP_DAYS}"
            else
              echo "${result}"
            fi
          }

          # ── Helper: convert a resolved keep_days value into a cutoff epoch ───
          # keep_days == -1 is the "keep forever" sentinel — represented as an
          # empty string so callers branch explicitly rather than relying on a
          # magic numeric cutoff that could accidentally compare true.
          # Reads (besides its argument): KEEP_DAYS, CUTOFF_EPOCH,
          # TODAY_MIDNIGHT from the step scope (NEW-C — previously undocumented;
          # TODAY_MIDNIGHT in particular now comes from steps.resolve.outputs,
          # not a local `date -u` call — see SUPP-3).
          policy_cutoff_epoch() {
            local kd="$1"
            if [[ "${kd}" == "-1" ]]; then
              echo ""   # forever — caller must treat empty as "never delete"
              return 0
            fi
            if [[ "${kd}" == "${KEEP_DAYS}" ]]; then
              echo "${CUTOFF_EPOCH}"   # reuse precomputed global cutoff
              return 0
            fi
            date -u -d "${TODAY_MIDNIGHT} - ${kd} days" +%s
          }

          # ── Helper: authenticate with Docker Hub, set DH_JWT + AUTH_HEADER ───
          # Factored out of the one-shot login below so it can also be called
          # mid-run to refresh an expired token (CRITICAL-2). Docker Hub JWTs
          # are short-lived (~5 minutes); a sweep over a large tag set can
          # easily outlive one token, so refresh-on-401 is not optional for
          # this registry the way it might be for a longer-lived credential.
          dockerhub_login() {
            local jwt
            jwt=$(curl -fsSL \
              -X POST \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
              "https://hub.docker.com/v2/users/login" \
              | jq -r '.token // empty')
            if [[ -z "${jwt}" ]]; then
              echo "❌ Docker Hub login returned an empty token." >&2
              exit 1
            fi
            DH_JWT="${jwt}"
            # Avoid: `set -x` in secret-bearing workflows.
            AUTH_HEADER="Authorization: Bearer ${DH_JWT}"
          }

          dockerhub_login
          echo "✅ Authenticated with Docker Hub."

          # ── Helper: authenticated GET with one-shot JWT refresh on expiry ───
          # (CRITICAL-2) On HTTP 401 we re-authenticate exactly once and retry
          # the same request; a second 401 after a fresh login is a real auth
          # failure, not a stale token, and is reported as such.
          dockerhub_get() {
            local url="$1" resp http body
            resp=$(curl -s -w '\n%{http_code}' -H "${AUTH_HEADER}" "${url}")
            http=$(printf '%s' "${resp}" | tail -n1)
            body=$(printf '%s' "${resp}" | sed '$d')
            if [[ "${http}" == "401" ]]; then
              echo "    🔄 Docker Hub JWT expired (HTTP 401) — re-authenticating..." >&2
              dockerhub_login
              resp=$(curl -s -w '\n%{http_code}' -H "${AUTH_HEADER}" "${url}")
              http=$(printf '%s' "${resp}" | tail -n1)
              body=$(printf '%s' "${resp}" | sed '$d')
            fi
            if [[ ! "${http}" =~ ^2 ]]; then
              echo "❌ Docker Hub GET failed (HTTP ${http}): ${url}" >&2
              printf '%s' "${body}" | head -c 500 >&2
              exit 1
            fi
            printf '%s' "${body}"
          }

          # ── Helper: does VALUE match any pattern in a comma-separated ERE
          #    list? (MEDIUM-7) Single primitive shared by the ignore-pattern
          #    and purge-keep-pattern checks below, which previously each
          #    carried an identical copy of this IFS-split + trim + grep loop.
          #    Trims surrounding whitespace from every pattern; empty patterns
          #    (e.g. from a trailing comma) are skipped, not treated as "match
          #    everything".
          _value_matches_any_pattern() {
            local value="$1" csv="$2" pattern
            [[ -z "${csv}" ]] && return 1
            local OLD_IFS="${IFS}"
            IFS=',' read -ra _PATTERNS <<< "${csv}"
            IFS="${OLD_IFS}"
            for pattern in "${_PATTERNS[@]}"; do
              pattern="${pattern#"${pattern%%[![:space:]]*}"}"
              pattern="${pattern%"${pattern##*[![:space:]]}"}"
              [[ -z "${pattern}" ]] && continue
              if echo "${value}" | grep -Eq "${pattern}"; then
                return 0
              fi
            done
            return 1
          }

          # ── Helper: does a tag name match any ignore pattern? ────────────────
          tag_is_ignored() { _value_matches_any_pattern "$1" "${IGNORE_PATTERNS:-}"; }

          # ── Helper: in PURGE mode, is this tag on the protected keep-list? ───
          # PURGE bypasses age + normal ignore patterns; PURGE_KEEP_PATTERNS is
          # the ONLY survivor list.  Empty PURGE_KEEP_PATTERNS → total wipe.
          purge_is_kept() { _value_matches_any_pattern "$1" "${PURGE_KEEP_PATTERNS:-}"; }

          # ── Helper: idempotent DELETE of one Docker Hub tag (honours DRY_RUN) ─
          # Single source of truth for the destructive call — reused by the
          # age-based loop, the purge loop, AND explicit deletion (HIGH-2;
          # explicit deletion previously inlined its own separate curl call).
          # Outcome is reported via stdout ("deleted" | "skipped" | error:<http>:
          # <body>) and a non-zero return on error; the CALLER increments
          # whichever counters apply to its context (main-loop vs explicit),
          # which is what makes one helper safely reusable by both.
          # Idempotency (CRITICAL-3): both HTTP 400 and 404 mean "already
          # gone" — Docker Hub returns 400 for some not-found cases, not just
          # 404, so treating only 404 as idempotent under-counted real
          # failures as errors.
          # Error visibility (MEDIUM-4): the response body is now captured and
          # surfaced on failure instead of being discarded via -o /dev/null.
          dockerhub_delete_tag() {
            local tag="$1" url resp http body
            if [[ "${DRY_RUN}" == 'true' ]]; then
              echo "deleted"
              return 0
            fi
            url="https://hub.docker.com/v2/repositories/${IMAGE_NAMESPACE}/${IMAGE_REPO}/tags/${tag}"
            resp=$(curl -s -w '\n%{http_code}' -X DELETE -H "${AUTH_HEADER}" "${url}")
            http=$(printf '%s' "${resp}" | tail -n1)
            body=$(printf '%s' "${resp}" | sed '$d')
            if [[ "${http}" == "401" ]]; then
              echo "    🔄 Docker Hub JWT expired mid-delete (HTTP 401) — re-authenticating..." >&2
              dockerhub_login
              resp=$(curl -s -w '\n%{http_code}' -X DELETE -H "${AUTH_HEADER}" "${url}")
              http=$(printf '%s' "${resp}" | tail -n1)
              body=$(printf '%s' "${resp}" | sed '$d')
            fi
            sleep "${API_DELETE_DELAY_SECONDS}"  # respect Docker Hub API rate limits
            if [[ "${http}" =~ ^2 ]]; then
              echo "deleted"
            elif [[ "${http}" == "400" || "${http}" == "404" ]]; then
              echo "skipped"
            else
              echo "error:${http}:${body:0:200}"
              return 1
            fi
          }

          # ── Helper: idempotent DELETE of one Docker Hub manifest by digest ──
          # Phase 2 cleanup: removes the actual manifest blob (Image Index or
          # platform image) so Docker Hub reclaims the storage layer.
          #
          # ENDPOINT: hub.docker.com Hub REST API — NOT registry-1.docker.io
          # (the OCI distribution endpoint rejects digest DELETE with
          # "UNSUPPORTED"; the Hub API accepts it and is authenticated with the
          # same JWT issued by dockerhub_login).
          #
          # Same retry / dry-run / idempotency contract as dockerhub_delete_tag:
          #   "deleted"          → manifest was removed (or dry-run no-op)
          #   "skipped"          → HTTP 400/404, already gone; not an error
          #   "error:<http>:<…>" → unexpected failure; caller increments ERRORS
          dockerhub_delete_manifest_by_digest() {
            local digest="$1" url resp http body
            if [[ "${DRY_RUN}" == 'true' ]]; then
              echo "deleted"
              return 0
            fi
            url="https://hub.docker.com/v2/repositories/${IMAGE_NAMESPACE}/${IMAGE_REPO}/manifests/${digest}"
            resp=$(curl -s -w '\n%{http_code}' -X DELETE -H "${AUTH_HEADER}" "${url}")
            http=$(printf '%s' "${resp}" | tail -n1)
            body=$(printf '%s' "${resp}" | sed '$d')
            if [[ "${http}" == "401" ]]; then
              echo "    🔄 Docker Hub JWT expired mid-manifest-delete (HTTP 401) — re-authenticating..." >&2
              dockerhub_login
              resp=$(curl -s -w '\n%{http_code}' -X DELETE -H "${AUTH_HEADER}" "${url}")
              http=$(printf '%s' "${resp}" | tail -n1)
              body=$(printf '%s' "${resp}" | sed '$d')
            fi
            sleep "${API_DELETE_DELAY_SECONDS}"
            if [[ "${http}" =~ ^2 ]]; then
              echo "deleted"
            elif [[ "${http}" == "400" || "${http}" == "404" ]]; then
              echo "skipped"
            else
              echo "error:${http}:${body:0:200}"
              return 1
            fi
          }

          # ── Helper: retry a delete with exponential backoff on transient
          #    failures (HIGH-1). Only HTTP 429 (rate-limited) and 5xx (server
          #    error) are retried — both are plausibly transient. Any other
          #    outcome (2xx, 400/404 "skipped", or a non-retryable 4xx) is
          #    returned immediately on the first attempt. Backoff doubles each
          #    attempt starting at RETRY_BASE_DELAY_SECONDS, up to
          #    MAX_DELETE_RETRIES attempts total.
          with_retry() {
            local attempt=1 result
            while true; do
              result=$("$@")
              case "${result}" in
                deleted|skipped)
                  echo "${result}"
                  return 0
                  ;;
                error:429:*|error:5??:*)
                  if (( attempt >= MAX_DELETE_RETRIES )); then
                    echo "${result}"
                    return 1
                  fi
                  local delay=$(( RETRY_BASE_DELAY_SECONDS * (2 ** (attempt - 1)) ))
                  echo "    ⏳ Transient failure (${result#error:}), retrying in ${delay}s (attempt ${attempt}/${MAX_DELETE_RETRIES})..." >&2
                  sleep "${delay}"
                  attempt=$(( attempt + 1 ))
                  ;;
                *)
                  echo "${result}"
                  return 1
                  ;;
              esac
            done
          }

          # ── Helper: classify a with_retry result into the caller's counters ─
          # Keeps the case/echo/counter-bump logic in one place instead of
          # duplicating it at every one of the (main age-based, main purge,
          # explicit) call sites that invoke a delete helper.
          # $1/$2/$3 are the names of the deleted/skipped/errors counter
          # variables to bump (different in the main loop vs explicit block).
          _apply_delete_result() {
            local result="$1" label="$2" deleted_var="$3" skipped_var="$4" errors_var="$5"
            case "${result}" in
              deleted)
                printf -v "${deleted_var}" '%s' "$(( ${!deleted_var} + 1 ))"
                ;;
              skipped)
                echo "    ℹ️  ${label} already gone — skipping." >&2
                printf -v "${skipped_var}" '%s' "$(( ${!skipped_var} + 1 ))"
                ;;
              error:*)
                echo "    ⚠️  Delete failed for ${label}: ${result#error:}" >&2
                printf -v "${errors_var}" '%s' "$(( ${!errors_var} + 1 ))"
                ;;
            esac
          }

          # ── Phase 2 digest-tracking state ────────────────────────────────────
          # During Phase 1 (tag enumeration), every tag's JSON already contains
          # the parent manifest digest (.digest) and the list of child platform-
          # image digests (.images[].digest).  We accumulate four sets:
          #
          #   KEPT_PARENT_DIGESTS  — Image Index digests of kept tags.
          #   KEPT_CHILD_DIGESTS   — platform-image digests of kept parents.
          #   CAND_PARENT_DIGESTS  — Image Index digests whose tags are deleted.
          #   CAND_CHILD_DIGESTS   — platform-image digests of candidate parents.
          #
          # Phase 2 (after Phase 1) deletes every digest in CAND_* that is NOT
          # also in the corresponding KEPT_* set.  Deletion order: parents
          # (Image Indexes) first, then children (platform images).  This avoids
          # leaving broken parent references visible in the Hub UI between the
          # two phases.
          #
          # Requires bash 4+ associative arrays; ubuntu-latest ships bash 5.x. ✓
          # Scope: manifests visible from /tags in this run only.  Pre-existing
          # untagged orphans (from earlier runs before this fix) are not
          # discoverable via /tags and are outside Phase 2's reach.
          declare -A KEPT_PARENT_DIGESTS=()
          declare -A KEPT_CHILD_DIGESTS=()
          declare -A CAND_PARENT_DIGESTS=()
          declare -A CAND_CHILD_DIGESTS=()

          # ── Helper: record the current tag's digests as KEPT ─────────────────
          # Reads TAG_DIGEST and _TAG_CHILD_DIGESTS from the calling scope
          # (both are set once per tag before any keep/delete branch runs).
          # A digest may appear in multiple tags (multi-tagged manifests);
          # one KEPT registration is sufficient to protect it.
          _dh_track_as_kept() {
            local d="${1:-}" c
            [[ -n "${d}" ]] && KEPT_PARENT_DIGESTS["${d}"]=1
            if [[ ${#_TAG_CHILD_DIGESTS[@]} -gt 0 ]]; then
              for c in "${_TAG_CHILD_DIGESTS[@]}"; do
                [[ -n "${c}" ]] && KEPT_CHILD_DIGESTS["${c}"]=1
              done
            fi
          }

          # ── Helper: record the current tag's digests as deletion candidates ──
          # Called when we intend to delete a tag.  If the same digest is also
          # protected by a kept tag, the KEPT_* sets take priority in Phase 2.
          _dh_track_as_candidate() {
            local d="${1:-}" c
            [[ -n "${d}" ]] && CAND_PARENT_DIGESTS["${d}"]=1
            if [[ ${#_TAG_CHILD_DIGESTS[@]} -gt 0 ]]; then
              for c in "${_TAG_CHILD_DIGESTS[@]}"; do
                [[ -n "${c}" ]] && CAND_CHILD_DIGESTS["${c}"]=1
              done
            fi
          }

          # ── Paginate through all tags ────────────────────────────────────────
          # Docker Hub paginates with a 'next' URL; empty/null signals last page.
          # 'ordering=last_updated' ensures newest tags come first (faster for
          # typical use-cases where most recent tags are kept).
          NEXT_URL="https://hub.docker.com/v2/repositories/${IMAGE_NAMESPACE}/${IMAGE_REPO}/tags?page_size=100&ordering=last_updated"
          DELETED=0
          KEPT=0
          IGNORED=0
          SKIPPED=0
          ERRORS=0

          if [[ "${PURGE}" == 'true' ]]; then
            echo "🔥 PURGE MODE — deleting ALL tags regardless of age/ignore patterns."
            echo "   Survivors limited to PURGE_KEEP_PATTERNS: '${PURGE_KEEP_PATTERNS:-<none — TOTAL WIPE>}'"
          fi

          while [[ -n "${NEXT_URL}" ]]; do
            RESPONSE=$(dockerhub_get "${NEXT_URL}")

            # Validate shape before iterating; a non-array here means an API error.
            if ! echo "${RESPONSE}" | jq -e '(.results | type) == "array"' > /dev/null 2>&1; then
              echo "❌ Unexpected Docker Hub API response:" >&2
              echo "${RESPONSE}" | head -c 500 >&2
              exit 1
            fi

            # Advance pagination cursor (empty means last page).
            NEXT_URL=$(echo "${RESPONSE}" | jq -r '.next // empty')

            while IFS= read -r TAG_JSON; do
              TAG_NAME=$(echo "${TAG_JSON}" | jq -r '.name // empty')
              [[ -z "${TAG_NAME}" ]] && continue

              # 'tag_last_pushed' is the canonical push timestamp; fall back to
              # 'last_updated' for older tags that predate the field's introduction.
              TAG_PUSHED=$(echo "${TAG_JSON}" | jq -r \
                '.tag_last_pushed // .last_updated // empty')

              # ── Phase 2: collect parent + child digests for this tag ───────
              # .digest       = the Image Index (or plain image) manifest digest.
              # .images[].digest = child platform-image digests (may be empty for
              #                    single-arch tags or tags with no images array).
              # Both are extracted once here so every keep/delete branch below
              # can call _dh_track_as_kept or _dh_track_as_candidate without
              # re-parsing TAG_JSON.
              TAG_DIGEST=$(printf '%s' "${TAG_JSON}" | jq -r '.digest // empty')
              mapfile -t _TAG_CHILD_DIGESTS < <(
                printf '%s' "${TAG_JSON}" \
                  | jq -r '.images // [] | .[].digest // empty' 2>/dev/null \
                || true)

              # ── PURGE MODE: bypass age + ignore patterns entirely ──────────
              if [[ "${PURGE}" == 'true' ]]; then
                if purge_is_kept "${TAG_NAME}"; then
                  echo "  🔒 PURGE-KEEP   ${TAG_NAME}  (matches purge keep pattern)"
                  IGNORED=$(( IGNORED + 1 ))
                  _dh_track_as_kept "${TAG_DIGEST}"
                  continue
                fi
                echo "  🔥 PURGE-DELETE ${TAG_NAME}  (pushed ${TAG_PUSHED:-unknown})"
                _apply_delete_result "$(with_retry dockerhub_delete_tag "${TAG_NAME}")" \
                  "${TAG_NAME}" DELETED SKIPPED ERRORS
                _dh_track_as_candidate "${TAG_DIGEST}"
                continue
              fi

              # ── Ignore-list check (takes priority over date) ───────────────
              if tag_is_ignored "${TAG_NAME}"; then
                echo "  🔒 IGNORE  ${TAG_NAME}  (matches ignore pattern)"
                IGNORED=$(( IGNORED + 1 ))
                _dh_track_as_kept "${TAG_DIGEST}"
                continue
              fi

              # ── Unknown push date → keep (safe default) ────────────────────
              if [[ -z "${TAG_PUSHED}" ]]; then
                echo "  ✅ KEEP    ${TAG_NAME}  (no push timestamp — kept by default)"
                KEPT=$(( KEPT + 1 ))
                _dh_track_as_kept "${TAG_DIGEST}"
                continue
              fi

              # ── Date check ─────────────────────────────────────────────────
              # Unparsable-but-present timestamp → keep (safe default).  The
              # previous `|| echo 0` set epoch=0, which is < any cutoff and would
              # have WRONGLY deleted the tag — a silent data-loss bug.
              TAG_EPOCH=$(date -u -d "${TAG_PUSHED}" +%s 2>/dev/null || true)
              if [[ -z "${TAG_EPOCH}" || ! "${TAG_EPOCH}" =~ ^[0-9]+$ ]]; then
                echo "  ✅ KEEP    ${TAG_NAME}  (unparsable timestamp '${TAG_PUSHED}' — kept by default)"
                KEPT=$(( KEPT + 1 ))
                _dh_track_as_kept "${TAG_DIGEST}"
                continue
              fi
              # ── Per-policy cutoff resolution ────────────────────────────────
              # First matching policy in CLEANUP_POLICIES wins; no match falls
              # back to the global KEEP_DAYS/CUTOFF_EPOCH computed above.
              TAG_KEEP_DAYS=$(get_policy_keep_days "${TAG_NAME}")
              TAG_CUTOFF_EPOCH=$(policy_cutoff_epoch "${TAG_KEEP_DAYS}")

              # keep_days == -1 → empty cutoff → never a deletion candidate.
              if [[ -z "${TAG_CUTOFF_EPOCH}" ]]; then
                echo "  ✅ KEEP    ${TAG_NAME}  (policy keep_days=-1 — kept forever)"
                KEPT=$(( KEPT + 1 ))
                _dh_track_as_kept "${TAG_DIGEST}"
                continue
              fi

              if (( TAG_EPOCH >= TAG_CUTOFF_EPOCH )); then
                echo "  ✅ KEEP    ${TAG_NAME}  (pushed ${TAG_PUSHED}, keep_days=${TAG_KEEP_DAYS})"
                KEPT=$(( KEPT + 1 ))
                _dh_track_as_kept "${TAG_DIGEST}"
                continue
              fi

              # ── Deletion candidate ─────────────────────────────────────────
              TAG_CUTOFF_DATE=$(date -u -d "@${TAG_CUTOFF_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)
              echo "  🗑️  DELETE  ${TAG_NAME}  (pushed ${TAG_PUSHED}, keep_days=${TAG_KEEP_DAYS}, before cutoff ${TAG_CUTOFF_DATE})"
              _apply_delete_result "$(with_retry dockerhub_delete_tag "${TAG_NAME}")" \
                "${TAG_NAME}" DELETED SKIPPED ERRORS
              _dh_track_as_candidate "${TAG_DIGEST}"
            done < <(echo "${RESPONSE}" | jq -c '.results[]')
          done

          # ── Explicit tag deletion ────────────────────────────────────────────
          # Attempt to delete each tag named in EXPLICIT_TAGS, regardless of age
          # or ignore-pattern matching.  Idempotent: absent tags are skipped.
          # (HIGH-2) Routed through the same dockerhub_delete_tag + with_retry
          # helpers as the main loop instead of an independent inlined curl —
          # one DELETE implementation, one retry policy, one idempotency rule.
          if [[ -n "${EXPLICIT_TAGS:-}" ]]; then
            echo ""
            echo "🎯  Explicit tag cleanup (Docker Hub):"
            EXPLICIT_DELETED=0
            EXPLICIT_SKIPPED=0
            EXPLICIT_ERRORS=0
            OLD_IFS="${IFS}"
            IFS=',' read -ra ETAG_LIST <<< "${EXPLICIT_TAGS}"
            IFS="${OLD_IFS}"
            for etag in "${ETAG_LIST[@]}"; do
              etag="${etag#"${etag%%[![:space:]]*}"}"
              etag="${etag%"${etag##*[![:space:]]}"}"
              [[ -z "${etag}" ]] && continue
              # Single unconditional label — the age-based and purge loops
              # above don't branch their DELETE / PURGE-DELETE lines on
              # DRY_RUN either, so this block shouldn't be the odd one out.
              # dockerhub_delete_tag itself no-ops on DRY_RUN=true (returns
              # "deleted" without calling the API), so one call path covers
              # both dry-run and live — no separate dry-run counter branch.
              # The live/dry-run distinction is surfaced exactly once, via
              # the DRY_LABEL suffix on the step summary's deleted count,
              # rather than duplicated at every line that logs a delete.
              echo "  🗑️  DELETE (explicit)  ${etag}"
              _apply_delete_result "$(with_retry dockerhub_delete_tag "${etag}")" \
                "${etag}" EXPLICIT_DELETED EXPLICIT_SKIPPED EXPLICIT_ERRORS
            done
            echo "   Explicit: deleted=${EXPLICIT_DELETED}  skipped=${EXPLICIT_SKIPPED}  errors=${EXPLICIT_ERRORS}"
            SKIPPED=$(( SKIPPED + EXPLICIT_SKIPPED ))
            ERRORS=$(( ERRORS + EXPLICIT_ERRORS ))
          fi

          # ════════════════════════════════════════════════════════════════
          # Phase 2 — Delete manifest blobs by digest (Docker Hub Hub API)
          # ════════════════════════════════════════════════════════════════
          # Phase 1 deleted tags (name pointers).  The underlying Image Index
          # and platform-image manifests remain until explicitly deleted by
          # digest.  This phase deletes every manifest collected in
          # CAND_PARENT/CHILD_DIGESTS that is NOT also in KEPT_PARENT/CHILD.
          #
          # Deletion order: parents (Image Indexes) first, then children
          # (platform images).  This ensures that at no point is a live parent
          # manifest left referencing already-deleted children, which would
          # produce broken references visible in the Hub UI between deletes.
          #
          # Idempotent: HTTP 400/404 on any manifest means it is already gone
          # (e.g. Docker Hub cascade-deleted a child when its parent was
          # removed).  These are counted as MANIFEST_SKIPPED, not errors.
          echo ""
          echo "🗂️  Phase 2: deleting manifest blobs by digest (Hub REST API)…"

          MANIFEST_DELETED=0
          MANIFEST_SKIPPED=0
          MANIFEST_ERRORS=0

          # ── 2-a: parent Image Index manifests ─────────────────────────────
          # Delete Image Indexes whose every pointing tag was reclaimed.
          # A digest present in KEPT_PARENT_DIGESTS means at least one kept
          # tag still references it — skip those.
          if [[ ${#CAND_PARENT_DIGESTS[@]} -gt 0 ]]; then
            for parent_digest in "${!CAND_PARENT_DIGESTS[@]}"; do
              # Protected by a kept tag → leave it alone.
              [[ -n "${KEPT_PARENT_DIGESTS[${parent_digest}]+x}" ]] && continue
              echo "  🗑️  DELETE manifest (index)  ${parent_digest}"
              _apply_delete_result \
                "$(with_retry dockerhub_delete_manifest_by_digest "${parent_digest}")" \
                "${parent_digest}" MANIFEST_DELETED MANIFEST_SKIPPED MANIFEST_ERRORS
            done
          fi

          # ── 2-b: child platform-image manifests ───────────────────────────
          # Delete platform images (linux/amd64, linux/arm64, attestations…)
          # that were children of reclaimed Image Indexes.  Skip any whose
          # parent was kept (they remain referenced) or that were also
          # directly used as a kept parent (edge case: single-arch non-index).
          if [[ ${#CAND_CHILD_DIGESTS[@]} -gt 0 ]]; then
            for child_digest in "${!CAND_CHILD_DIGESTS[@]}"; do
              # Referenced by a kept parent → keep.
              [[ -n "${KEPT_CHILD_DIGESTS[${child_digest}]+x}" ]] && continue
              # Is itself a kept parent (single-arch without Index wrapper) → keep.
              [[ -n "${KEPT_PARENT_DIGESTS[${child_digest}]+x}" ]] && continue
              echo "  🗑️  DELETE manifest (child)  ${child_digest}"
              _apply_delete_result \
                "$(with_retry dockerhub_delete_manifest_by_digest "${child_digest}")" \
                "${child_digest}" MANIFEST_DELETED MANIFEST_SKIPPED MANIFEST_ERRORS
            done
          fi

          if [[ $(( MANIFEST_DELETED + MANIFEST_SKIPPED + MANIFEST_ERRORS )) -eq 0 ]]; then
            echo "   (no manifest digests to reclaim — Phase 1 kept all referenced digests)"
          fi

          # ── Step summary ──────────────────────────────────────────────────
          # (MEDIUM-3) One-liner form, consistent with the other two registry
          # steps — previously this step alone used a 4-line if/else for the
          # exact same "(dry-run)" suffix.
          DRY_LABEL=""
          [[ "${DRY_RUN}" == 'true' ]] && DRY_LABEL=" (dry-run)"
          echo ""
          echo "📊 Docker Hub cleanup complete:"
          echo "   Phase 1 — tags"
          echo "   Would delete / Deleted : ${DELETED}${DRY_LABEL}"
          echo "   Kept    : ${KEPT}"
          echo "   Ignored : ${IGNORED}"
          echo "   Skipped : ${SKIPPED}  (already gone — idempotent no-ops, not errors)"
          echo "   Errors  : ${ERRORS}"
          echo "   Phase 2 — manifest digests (Hub REST API)"
          echo "   Manifests deleted : ${MANIFEST_DELETED}${DRY_LABEL}"
          echo "   Manifests skipped : ${MANIFEST_SKIPPED}  (already gone — idempotent no-ops)"
          echo "   Manifests errors  : ${MANIFEST_ERRORS}"

          # (MEDIUM-2) Export per-registry counts as step outputs so the final
          # job-summary step can render them without re-parsing this step's log.
          {
            echo "deleted=${DELETED}"
            echo "kept=${KEPT}"
            echo "ignored=${IGNORED}"
            echo "skipped=${SKIPPED}"
            echo "errors=${ERRORS}"
            echo "manifest_deleted=${MANIFEST_DELETED}"
            echo "manifest_skipped=${MANIFEST_SKIPPED}"
            echo "manifest_errors=${MANIFEST_ERRORS}"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${ERRORS}" -gt 0 || "${MANIFEST_ERRORS}" -gt 0 ]]; then
            exit 1
          fi


      # ════════════════════════════════════════════════════════════════════════
      # GitHub GHCR
      # ════════════════════════════════════════════════════════════════════════
      # - name: Log in to registry
      #   # This is where you will update the PAT to GITHUB_TOKEN
      #   run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: 🧹 Cleanup old tags — GitHub GHCR
        id: cleanup_ghcr
        if: >-
          steps.resolve.outputs.run_cleanup == 'true' &&
          (env.CLEANUP_TARGET == 'all' || env.CLEANUP_TARGET == 'github_ghcr')
        continue-on-error: true
        shell: bash
        env:
          # GITHUB_TOKEN is auto-provisioned; packages:write is granted at job level.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN:  ${{ steps.resolve.outputs.dry_run }}
          PURGE:    ${{ steps.resolve.outputs.purge }}
          # Cutoff values resolved once by the resolve step (SUPP-3) — all
          # registry steps consume the same baseline rather than each calling
          # `date` independently.
          TODAY_MIDNIGHT: ${{ steps.resolve.outputs.today_midnight }}
          CUTOFF_EPOCH:   ${{ steps.resolve.outputs.cutoff_epoch }}
          CUTOFF_DATE:    ${{ steps.resolve.outputs.cutoff_date }}
        run: |
          set -Eeuo pipefail

          echo "═══════════════════════════════════════════════════════════════"
          echo "📦  GitHub GHCR cleanup"
          echo "    Image      : ghcr.io/${GHCR_ORG}/${IMAGE_REPO}"
          echo "    Keep days  : ${KEEP_DAYS}"
          echo "    Dry run    : ${DRY_RUN}"
          echo "    Purge      : ${PURGE}"
          echo "    Ignore     : ${IGNORE_PATTERNS}"
          echo "    Explicit   : ${EXPLICIT_TAGS:-<none>}"
          echo "    Cutoff     : ${CUTOFF_DATE} (epoch ${CUTOFF_EPOCH})"
          echo "═══════════════════════════════════════════════════════════════"

          # ── Rate-limit / retry tuning ─────────────────────────────────────────
          readonly API_DELETE_DELAY_SECONDS="0.3"
          readonly MAX_DELETE_RETRIES=3
          readonly RETRY_BASE_DELAY_SECONDS=1

          # ── Helper: does VALUE match any pattern in a comma-separated ERE
          #    list? Single primitive shared by the ignore-pattern and
          #    purge-keep-pattern checks below, which previously each carried an
          #    identical copy of the IFS-split + trim + grep loop.
          #    Trims surrounding whitespace from every pattern; empty patterns
          #    (e.g. from a trailing comma) are skipped, not treated as "match
          #    everything".
          _value_matches_any_pattern() {
            local value="$1" csv="$2" pattern
            [[ -z "${csv}" ]] && return 1
            local OLD_IFS="${IFS}"
            IFS=',' read -ra _PATTERNS <<< "${csv}"
            IFS="${OLD_IFS}"
            for pattern in "${_PATTERNS[@]}"; do
              pattern="${pattern#"${pattern%%[![:space:]]*}"}"
              pattern="${pattern%"${pattern##*[![:space:]]}"}"
              [[ -z "${pattern}" ]] && continue
              if echo "${value}" | grep -Eq "${pattern}"; then
                return 0
              fi
            done
            return 1
          }

          # ── Helper: does ANY tag in the JSON array match an ignore pattern? ──
          # Returns 0 (true = protected) if at least one tag matches.
          # The whole manifest version is then kept, even if other tags would be
          # candidates.  This prevents split-brain states where one tag on a
          # shared digest is deleted and another preserved.
          any_tag_is_ignored() {
            local tags_json="$1" tag
            while IFS= read -r tag; do
              [[ -z "${tag}" ]] && continue
              _value_matches_any_pattern "${tag}" "${IGNORE_PATTERNS:-}" && return 0
            done < <(echo "${tags_json}" | jq -r '.[] // empty')
            return 1  # no tags are protected — version is a candidate
          }

          # ── Helper: in PURGE mode, is ANY tag on the protected keep-list? ────
          # Mirrors any_tag_is_ignored but against PURGE_KEEP_PATTERNS.  An
          # untagged manifest (empty tag list) matches nothing → always purged,
          # which is exactly how stale orphaned digests get reclaimed.
          purge_any_tag_is_kept() {
            local tags_json="$1" tag
            [[ -z "${PURGE_KEEP_PATTERNS:-}" ]] && return 1
            while IFS= read -r tag; do
              [[ -z "${tag}" ]] && continue
              _value_matches_any_pattern "${tag}" "${PURGE_KEEP_PATTERNS}" && return 0
            done < <(echo "${tags_json}" | jq -r '.[] // empty')
            return 1
          }

          # ── Helper: idempotent DELETE of one GHCR version (honours DRY_RUN) ──
          # Returns "deleted", "skipped", or "error:<http>:<body>" as stdout.
          # Does NOT mutate DELETED/ERRORS globals; callers use _apply_delete_result.
          # Idempotency: 404 → "skipped" (already gone, not an error).
          # Error visibility: response body is captured and surfaced on failure.
          ghcr_delete_version() {
            local version_id="$1"
            if [[ "${DRY_RUN}" == 'true' ]]; then
              echo "deleted"
              return 0
            fi
            local resp http body
            resp=$(curl -s -w '\n%{http_code}' \
              -X DELETE \
              -H "${AUTH_HEADER}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${BASE_URL}/${version_id}")
            http=$(printf '%s' "${resp}" | tail -n1)
            body=$(printf '%s' "${resp}" | sed '$d')
            sleep "${API_DELETE_DELAY_SECONDS}"
            if [[ "${http}" =~ ^2 ]]; then
              echo "deleted"
            elif [[ "${http}" == "404" ]]; then
              echo "skipped"
            else
              echo "error:${http}:${body:0:200}"
              return 1
            fi
          }

          # ── Helper: retry a delete with exponential backoff on transient
          #    failures. Only HTTP 429 (rate-limited) and 5xx (server error)
          #    are retried — both are plausibly transient. Any other outcome
          #    (2xx, "skipped", or a non-retryable 4xx) is returned immediately.
          #    Backoff doubles each attempt starting at RETRY_BASE_DELAY_SECONDS,
          #    up to MAX_DELETE_RETRIES attempts total.
          with_retry() {
            local attempt=1 result
            while true; do
              result=$("$@")
              case "${result}" in
                deleted|skipped)
                  echo "${result}"
                  return 0
                  ;;
                error:429:*|error:5??:*)
                  if (( attempt >= MAX_DELETE_RETRIES )); then
                    echo "${result}"
                    return 1
                  fi
                  local delay=$(( RETRY_BASE_DELAY_SECONDS * (2 ** (attempt - 1)) ))
                  echo "    ⏳ Transient failure (${result#error:}), retrying in ${delay}s (attempt ${attempt}/${MAX_DELETE_RETRIES})..." >&2
                  sleep "${delay}"
                  attempt=$(( attempt + 1 ))
                  ;;
                *)
                  echo "${result}"
                  return 1
                  ;;
              esac
            done
          }

          # ── Helper: classify a with_retry result into the caller's counters.
          #    Keeps the case/echo/counter-bump logic in one place instead of
          #    duplicating it at every call site (main loop and explicit block).
          #    $3/$4/$5 are the names of the deleted/skipped/errors counter
          #    variables to bump (different in the main loop vs explicit block).
          _apply_delete_result() {
            local result="$1" label="$2" deleted_var="$3" skipped_var="$4" errors_var="$5"
            case "${result}" in
              deleted)
                printf -v "${deleted_var}" '%s' "$(( ${!deleted_var} + 1 ))"
                ;;
              skipped)
                echo "    ℹ️  ${label} already gone — skipping." >&2
                printf -v "${skipped_var}" '%s' "$(( ${!skipped_var} + 1 ))"
                ;;
              error:*)
                echo "    ⚠️  Delete failed for ${label}: ${result#error:}" >&2
                printf -v "${errors_var}" '%s' "$(( ${!errors_var} + 1 ))"
                ;;
            esac
          }

          # ── Paginate through all package versions ────────────────────────────
          # GitHub's Packages API lists manifest versions (not individual tags).
          # Each version can carry multiple tags.  Deletion removes the version
          # and all its tags atomically.
          # Endpoint: GET /orgs/{org}/packages/container/{package}/versions
          BASE_URL="https://api.github.com/orgs/${GHCR_ORG}/packages/container/${IMAGE_REPO}/versions"
          DELETED=0
          KEPT=0
          IGNORED=0
          SKIPPED=0
          ERRORS=0
          PAGE=1

          # Avoid: `set -x` in secret-bearing workflows.
          AUTH_HEADER="Authorization: Bearer ${GH_TOKEN}"

          if [[ "${PURGE}" == 'true' ]]; then
            echo "🔥 PURGE MODE — deleting ALL manifest versions regardless of age/ignore patterns."
            echo "   Survivors limited to PURGE_KEEP_PATTERNS: '${PURGE_KEEP_PATTERNS:-<none — TOTAL WIPE>}'"
            echo "   Untagged/orphaned manifests carry no tags and are always reclaimed."
          fi

          while true; do
            RESPONSE=$(curl -fsSL \
              -H "${AUTH_HEADER}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${BASE_URL}?per_page=100&page=${PAGE}")

            # Validate response shape.
            if ! echo "${RESPONSE}" | jq -e 'type == "array"' > /dev/null 2>&1; then
              echo "❌ Unexpected GHCR API response (page ${PAGE}):" >&2
              echo "${RESPONSE}" | head -c 500 >&2
              exit 1
            fi

            VERSION_COUNT=$(echo "${RESPONSE}" | jq 'length')
            if (( VERSION_COUNT == 0 )); then
              break  # last page reached
            fi

            while IFS= read -r VERSION_JSON; do
              VERSION_ID=$(echo "${VERSION_JSON}"  | jq -r '.id')
              UPDATED_AT=$(echo "${VERSION_JSON}"  | jq -r '.updated_at // empty')
              TAGS_JSON=$(echo "${VERSION_JSON}"   | jq -c '.metadata.container.tags // []')
              # Build a display string; untagged manifests show as <untagged>.
              TAGS_DISPLAY=$(echo "${TAGS_JSON}" | jq -r '.[]' \
                | paste -sd ',' - 2>/dev/null || true)
              if [[ -z "${TAGS_DISPLAY}" ]]; then
                TAGS_DISPLAY="<untagged — orphaned manifest>"
              fi

              # ── PURGE MODE: bypass age + ignore patterns entirely ──────────
              if [[ "${PURGE}" == 'true' ]]; then
                if purge_any_tag_is_kept "${TAGS_JSON}"; then
                  echo "  🔒 PURGE-KEEP   version=${VERSION_ID} tags=[${TAGS_DISPLAY}]  (has purge-keep tag)"
                  IGNORED=$(( IGNORED + 1 ))
                  continue
                fi
                echo "  🔥 PURGE-DELETE version=${VERSION_ID} tags=[${TAGS_DISPLAY}]"
                _apply_delete_result "$(with_retry ghcr_delete_version "${VERSION_ID}")" \
                  "version=${VERSION_ID}" DELETED SKIPPED ERRORS
                continue
              fi

              # ── Ignore-list check (whole version) ─────────────────────────
              if any_tag_is_ignored "${TAGS_JSON}"; then
                echo "  🔒 IGNORE  version=${VERSION_ID} tags=[${TAGS_DISPLAY}]  (has protected tag)"
                IGNORED=$(( IGNORED + 1 ))
                continue
              fi

              # ── Unknown update timestamp → keep ────────────────────────────
              if [[ -z "${UPDATED_AT}" ]]; then
                echo "  ✅ KEEP    version=${VERSION_ID} tags=[${TAGS_DISPLAY}]  (no timestamp)"
                KEPT=$(( KEPT + 1 ))
                continue
              fi

              # ── Date check ─────────────────────────────────────────────────
              # Unparsable-but-present timestamp → keep (safe default).  The old
              # `|| echo 0` set epoch=0 and would have WRONGLY deleted the
              # version — a silent data-loss bug, now fixed.
              VERSION_EPOCH=$(date -u -d "${UPDATED_AT}" +%s 2>/dev/null || true)
              if [[ -z "${VERSION_EPOCH}" || ! "${VERSION_EPOCH}" =~ ^[0-9]+$ ]]; then
                echo "  ✅ KEEP    version=${VERSION_ID} tags=[${TAGS_DISPLAY}]  (unparsable timestamp '${UPDATED_AT}' — kept)"
                KEPT=$(( KEPT + 1 ))
                continue
              fi
              if (( VERSION_EPOCH >= CUTOFF_EPOCH )); then
                echo "  ✅ KEEP    version=${VERSION_ID} tags=[${TAGS_DISPLAY}]  (updated ${UPDATED_AT})"
                KEPT=$(( KEPT + 1 ))
                continue
              fi

              # ── Deletion candidate ─────────────────────────────────────────
              echo "  🗑️  DELETE  version=${VERSION_ID} tags=[${TAGS_DISPLAY}]  (updated ${UPDATED_AT})"
              _apply_delete_result "$(with_retry ghcr_delete_version "${VERSION_ID}")" \
                "version=${VERSION_ID}" DELETED SKIPPED ERRORS
            done < <(echo "${RESPONSE}" | jq -c '.[]')

            PAGE=$(( PAGE + 1 ))
          done

          # ── Explicit tag deletion ────────────────────────────────────────────
          # GHCR does not expose a "delete single tag" endpoint.  Tags live on
          # manifest versions; deleting a version removes all tags on that digest.
          # Procedure for each explicit tag:
          #   1. Paginate versions to find the one whose tag list contains the name.
          #   2. Log ALL tags that will be removed along with the target.
          #   3. Delete the version (or dry-run log only).
          # If the tag is not found in any version it is silently skipped.
          if [[ -n "${EXPLICIT_TAGS:-}" ]]; then
            echo ""
            echo "🎯  Explicit tag cleanup (GHCR):"
            EXPLICIT_DELETED=0
            EXPLICIT_SKIPPED=0
            EXPLICIT_ERRORS=0
            OLD_IFS="${IFS}"
            IFS=',' read -ra ETAG_LIST <<< "${EXPLICIT_TAGS}"
            IFS="${OLD_IFS}"
            for etag in "${ETAG_LIST[@]}"; do
              etag="${etag#"${etag%%[![:space:]]*}"}"
              etag="${etag%"${etag##*[![:space:]]}"}"
              [[ -z "${etag}" ]] && continue

              # Locate the version that carries this tag.
              FOUND_ID=""
              FOUND_ALL_TAGS=""
              EP=1
              while true; do
                PAGE_RESP=$(curl -fsSL \
                  -H "${AUTH_HEADER}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${BASE_URL}?per_page=100&page=${EP}")
                if ! echo "${PAGE_RESP}" | jq -e 'type == "array"' > /dev/null 2>&1; then
                  echo "    ⚠️  Unexpected GHCR response during explicit lookup (page ${EP})" >&2
                  break
                fi
                PAGE_COUNT=$(echo "${PAGE_RESP}" | jq 'length')
                (( PAGE_COUNT == 0 )) && break

                MATCH_ID=$(echo "${PAGE_RESP}" | jq -r \
                  --arg t "${etag}" \
                  '.[] | select((.metadata.container.tags // []) | any(. == $t)) | .id' \
                  | head -1)
                if [[ -n "${MATCH_ID}" ]]; then
                  FOUND_ID="${MATCH_ID}"
                  FOUND_ALL_TAGS=$(echo "${PAGE_RESP}" | jq -r \
                    --arg t "${etag}" \
                    '.[] | select((.metadata.container.tags // []) | any(. == $t))
                         | .metadata.container.tags[]' \
                    | paste -sd ',' - 2>/dev/null || true)
                  break
                fi
                EP=$(( EP + 1 ))
              done

              if [[ -z "${FOUND_ID}" ]]; then
                echo "  ⏭️  SKIP   (explicit)  ${etag}  (not found in GHCR)"
                EXPLICIT_SKIPPED=$(( EXPLICIT_SKIPPED + 1 ))
                continue
              fi

              # Warn that all co-located tags will be removed with this version.
              # Single unconditional label — ghcr_delete_version no-ops on
              # DRY_RUN=true (returns "deleted" without calling the API), so
              # one call path covers both modes.
              echo "  🗑️  DELETE (explicit)"
              echo "      target-tag : ${etag}"
              echo "      version-id : ${FOUND_ID}"
              echo "      all-tags   : [${FOUND_ALL_TAGS}]"
              echo "      ⚠️  All tags on this manifest version are removed together."
              _apply_delete_result "$(with_retry ghcr_delete_version "${FOUND_ID}")" \
                "version=${FOUND_ID}" EXPLICIT_DELETED EXPLICIT_SKIPPED EXPLICIT_ERRORS
            done
            echo "   Explicit: deleted=${EXPLICIT_DELETED}  skipped=${EXPLICIT_SKIPPED}  errors=${EXPLICIT_ERRORS}"
            SKIPPED=$(( SKIPPED + EXPLICIT_SKIPPED ))
            ERRORS=$(( ERRORS + EXPLICIT_ERRORS ))
          fi

          # ── Step summary ──────────────────────────────────────────────────
          # (MEDIUM-3) One-liner form — consistent with Docker Hub and Quay.
          DRY_LABEL=""
          [[ "${DRY_RUN}" == 'true' ]] && DRY_LABEL=" (dry-run)"
          echo ""
          echo "📊 GHCR cleanup complete:"
          echo "   Would delete / Deleted : ${DELETED}${DRY_LABEL}"
          echo "   Kept    : ${KEPT}"
          echo "   Ignored : ${IGNORED}"
          echo "   Skipped : ${SKIPPED}  (already gone — idempotent no-ops, not errors)"
          echo "   Errors  : ${ERRORS}"

          # (MEDIUM-2) Export per-registry counts as step outputs so the final
          # job-summary step can render them without re-parsing this step's log.
          {
            echo "deleted=${DELETED}"
            echo "kept=${KEPT}"
            echo "ignored=${IGNORED}"
            echo "skipped=${SKIPPED}"
            echo "errors=${ERRORS}"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${ERRORS}" -gt 0 ]]; then
            exit 1
          fi


      # ════════════════════════════════════════════════════════════════════════
      # RedHat Quay
      # ════════════════════════════════════════════════════════════════════════
      #
      # REGISTRY COORDINATES
      #   quay.io/${QUAY_NAMESPACE}/${IMAGE_REPO}
      #   quay.io/scikit-plots/scikit-plots  (mirrors ghcr.io/scikit-plots/scikit-plots)
      #   QUAY_NAMESPACE = github.repository_owner = GHCR_ORG (same value)
      #
      # QUAY_ROBOT_TOKEN — How to generate
      # ─────────────────────────────────────────────────────────────────────────
      # Option A — Robot Account (RECOMMENDED for CI):
      #   Robot accounts are scoped, revokable, and auditable.  Preferred for
      #   automated pipelines over personal OAuth tokens.
      #   1. Visit https://quay.io/organization/<QUAY_NAMESPACE>?tab=robots
      #   2. Click "Create Robot Account".
      #   3. Grant "Write" (includes delete) access to the target repository.
      #   4. Copy the generated token string.
      #   5. Add it to GitHub Secrets as:  QUAY_ROBOT_TOKEN = <robot-token>
      #   Robot token format: <namespace>+<robot-name>:<secret>
      #
      # Option B — OAuth Application Token:
      #   1. Visit https://quay.io/user/<username>?tab=applications  (or org page)
      #   2. Click "Create New Application" → choose a name (e.g. "scikitplot-ci").
      #   3. Click "Generate Token" → select scope: "Administer Repositories".
      #   4. Copy the token.
      #   5. Add it to GitHub Secrets as:  QUAY_ROBOT_TOKEN = <oauth-token>
      #
      # TOKEN TYPE: OAuth Application Token (NOT a robot account token)
      #   Robot tokens use HTTP Basic Auth (user:secret) and cannot be used
      #   as Bearer tokens.
      #   Org OAuth Application tokens use Bearer auth and are the correct type.
      #
      # WHY NOT /api/v1/user/ FOR AUTH CHECK:
      #   Quay has three token types:
      #     Personal user tokens  → Bearer → /api/v1/user/ 200  ✅
      #     Robot account tokens  → Basic Auth only
      #     Org OAuth App tokens  → Bearer → /api/v1/user/ 401  ← fails for org tokens
      #   Organisation OAuth Application tokens are org-scoped, not user-scoped.
      #   The correct auth check is the repository's "can_admin" field, which is
      #   only true when the token has "Administer Repositories" scope.
      #
      # HOW TO GENERATE:
      #   1. https://quay.io/organization/scikit-plots?tab=OAuthApplications
      #   2. Click "scikitplot-ci" → "Generate Token"
      #   3. Tick ☑ "Administer Repositories" → "Generate Access Token" → Authorize
      #   4. Copy the token (shown once only)
      #   5. GitHub → Settings → Secrets → Actions:
      #      ADD:    QUAY_OAUTH_TOKEN  ← paste token here
      #      DELETE: QUAY_ROBOT_TOKEN  ← remove the old, wrong-type secret
      #
      # Option C — Encrypted Docker CLI Password (NOT for REST API calls):
      #   https://quay.io/user/<username>?tab=settings → "Generate Encrypted Password"
      #   This is only for `docker login quay.io`; it cannot authenticate REST API
      #   calls.  Use Option A or B for this workflow.
      #
      # QUAY.IO BUILD TRIGGERS (informational — not managed by this workflow)
      #   The repository quay.io/scikit-plots/scikit-plots uses a GitHub build
      #   trigger (Dockerfile: /docker/Dockerfile.python, context: /).
      #   Tagging options active on the trigger:
      #     latest            (if default branch)
      #     ${parsed_ref.branch}-${commit}
      #   Other available tag template variables (for reference):
      #     ${commit}
      #     ${commit_info.short_sha}
      #     ${parsed_ref.branch}-${commit_info.short_sha}
      #
      # IDEMPOTENCY GUARANTEES:
      #   - HTTP 400/404 on tag DELETE → "already gone", not an error
      #   - DRY_RUN=true → zero destructive API calls
      #   - Tags matching IGNORE_PATTERNS → unconditionally kept
      #   - Tags with missing/unparsable timestamps → kept (safe default)
      #   - Missing credentials → exit 0 (soft-skip, job does not fail)
      # ─────────────────────────────────────────────────────────────────────────
      # Robot account authentication:
      #   Username:
      #     <namespace>+<robot-name>
      #   Token/password:
      #     <generated-robot-secret>
      # REST API usage:
      #   Authorization: Bearer <token>
      # Docker login usage:
      #   docker login quay.io \
      #     -u "<namespace>+<robot-name>" \
      #     -p "<token>"
      # ─────────────────────────────────────────────────────────────────────────
      # export QUAY_OAUTH_TOKEN="<your-new-oauth-token>"
      # bash quay_token_test.sh
      - name: 🧹 Cleanup old tags — 🔴 RedHat Quay
        id: cleanup_quay
        if: >-
          steps.resolve.outputs.run_cleanup == 'true' &&
          (env.CLEANUP_TARGET == 'all' || env.CLEANUP_TARGET == 'redhat_quay')
        continue-on-error: true
        # shell: /usr/bin/bash --noprofile --norc -e -o pipefail {0}
        shell: bash
        env:
          QUAY_ROBOT_USERNAME: scikit-plots+quay_bot  # for docker login
          QUAY_ROBOT_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}  # Repository Secret
          # ── Secret: OAuth Application Token (not a robot account token) ────────
          # OAuth Application Token — generated via the Applications tab in the
          # Quay organisation settings, NOT a robot account token.
          QUAY_OAUTH_TOKEN: ${{ secrets.QUAY_OAUTH_TOKEN }}
          DRY_RUN: ${{ steps.resolve.outputs.dry_run }}
          PURGE:   ${{ steps.resolve.outputs.purge }}
          # (SUPP-3) Consumed from the resolve step's single source of truth
          # instead of each registry step computing its own "today"/cutoff —
          # see the resolve step for why that mattered.
          TODAY_MIDNIGHT: ${{ steps.resolve.outputs.today_midnight }}
          CUTOFF_EPOCH:   ${{ steps.resolve.outputs.cutoff_epoch }}
          CUTOFF_DATE:    ${{ steps.resolve.outputs.cutoff_date }}
        run: |
          # Avoid: `set -x` in secret-bearing workflows.
          set -Eeuo pipefail

          echo "═══════════════════════════════════════════════════════════════"
          echo "🔴  RedHat Quay cleanup"
          echo "    Image      : quay.io/${QUAY_NAMESPACE}/${IMAGE_REPO}"
          echo "    Keep days  : ${KEEP_DAYS}"
          echo "    Dry run    : ${DRY_RUN}"
          echo "    Purge      : ${PURGE}"
          echo "    Ignore     : ${IGNORE_PATTERNS}"
          echo "    Explicit   : ${EXPLICIT_TAGS:-<none>}"
          echo "    Cutoff     : ${CUTOFF_DATE} (epoch ${CUTOFF_EPOCH}) [global default]"
          echo "═══════════════════════════════════════════════════════════════"

          # ── Guard: credentials required ──────────────────────────────────────
          # Soft-skip with exit 0 so the job is not marked failed when the secret
          # is absent (e.g. on forks or before the secret has been configured).
          if [[ -z "${QUAY_OAUTH_TOKEN:-}" ]]; then
            echo "⚠️  QUAY_OAUTH_TOKEN is not set." >&2
            echo "   Quay cleanup skipped (credentials absent)." >&2
            echo "   To enable: generate an OAuth Application Token at" >&2
            echo "   https://quay.io/organization/${QUAY_NAMESPACE}?tab=OAuthApplications" >&2
            echo "   then add it as GitHub secret QUAY_OAUTH_TOKEN." >&2
            exit 0
          fi

          # ── Guard: reject robot-account token format ──────────────────────────
          # Robot tokens are "username:secret" pairs used with Basic Auth.
          # A colon in QUAY_OAUTH_TOKEN is an unambiguous wrong-type indicator.
          if [[ "${QUAY_OAUTH_TOKEN}" == *:* ]]; then
            echo "❌ QUAY_OAUTH_TOKEN contains a colon — this is a robot account" >&2
            echo "   'username:secret' pair, not an OAuth Application Token." >&2
            echo "   Generate an OAuth token at:" >&2
            echo "   https://quay.io/organization/${QUAY_NAMESPACE}?tab=OAuthApplications" >&2
            exit 1
          fi

          # ── Rate-limit / retry tuning ──────────────────────────────────────────
          # Named constants instead of a magic "sleep 0.3" scattered at call sites.
          readonly API_DELETE_DELAY_SECONDS="0.3"
          readonly MAX_DELETE_RETRIES=3
          readonly RETRY_BASE_DELAY_SECONDS=1

          # ── Helper: does VALUE match any pattern in a comma-separated ERE
          #    list? (MEDIUM-7) Single primitive shared by the ignore-pattern
          #    and purge-keep-pattern checks below, which previously each
          #    carried an identical copy of this IFS-split + trim + grep loop.
          #    Trims surrounding whitespace from every pattern; empty patterns
          #    (e.g. from a trailing comma) are skipped, not treated as "match
          #    everything".
          _value_matches_any_pattern() {
            local value="$1" csv="$2" pattern
            [[ -z "${csv}" ]] && return 1
            local OLD_IFS="${IFS}"
            IFS=',' read -ra _PATTERNS <<< "${csv}"
            IFS="${OLD_IFS}"
            for pattern in "${_PATTERNS[@]}"; do
              pattern="${pattern#"${pattern%%[![:space:]]*}"}"
              pattern="${pattern%"${pattern##*[![:space:]]}"}"
              [[ -z "${pattern}" ]] && continue
              if echo "${value}" | grep -Eq "${pattern}"; then
                return 0
              fi
            done
            return 1
          }

          # ── Helper: does a tag name match any ignore pattern? ─────────────────
          tag_is_ignored() { _value_matches_any_pattern "$1" "${IGNORE_PATTERNS:-}"; }

          # ── Helper: in PURGE mode, is this tag on the protected keep-list? ───
          # PURGE bypasses age + normal ignore patterns; PURGE_KEEP_PATTERNS is
          # the ONLY survivor list.  Empty PURGE_KEEP_PATTERNS → total wipe.
          purge_is_kept() { _value_matches_any_pattern "$1" "${PURGE_KEEP_PATTERNS:-}"; }

          # ── Helper: idempotent DELETE of one Quay tag (honours DRY_RUN) ──────
          # Returns "deleted", "skipped", or "error:<http>:<body>" as stdout.
          # Does NOT mutate DELETED/ERRORS globals; callers use _apply_delete_result.
          # Idempotency: 400/404 → "skipped" (already gone, not an error).
          # Error visibility: response body is captured and surfaced on failure.
          quay_delete_tag() {
            local tag="$1"
            if [[ "${DRY_RUN}" == 'true' ]]; then
              echo "deleted"
              return 0
            fi
            local resp http body
            resp=$(curl -s -w "\n%{http_code}" \
              -X DELETE \
              -H "${AUTH_HEADER}" \
              "${QUAY_API}/tag/${tag}")
            http=$(printf '%s' "${resp}" | tail -1)
            body=$(printf '%s' "${resp}" | sed '$d')
            sleep "${API_DELETE_DELAY_SECONDS}"  # respect Quay API rate limits
            if [[ "${http}" =~ ^2 ]]; then
              echo "deleted"
            elif [[ "${http}" == "400" || "${http}" == "404" ]]; then
              echo "skipped"
            else
              echo "error:${http}:${body:0:200}"
              return 1
            fi
          }

          # ── Helper: retry a delete with exponential backoff on transient
          #    failures. Only HTTP 429 (rate-limited) and 5xx (server error)
          #    are retried — both are plausibly transient. Any other outcome
          #    (2xx, "skipped", or a non-retryable 4xx) is returned immediately.
          #    Backoff doubles each attempt starting at RETRY_BASE_DELAY_SECONDS,
          #    up to MAX_DELETE_RETRIES attempts total.
          with_retry() {
            local attempt=1 result
            while true; do
              result=$("$@")
              case "${result}" in
                deleted|skipped)
                  echo "${result}"
                  return 0
                  ;;
                error:429:*|error:5??:*)
                  if (( attempt >= MAX_DELETE_RETRIES )); then
                    echo "${result}"
                    return 1
                  fi
                  local delay=$(( RETRY_BASE_DELAY_SECONDS * (2 ** (attempt - 1)) ))
                  echo "    ⏳ Transient failure (${result#error:}), retrying in ${delay}s (attempt ${attempt}/${MAX_DELETE_RETRIES})..." >&2
                  sleep "${delay}"
                  attempt=$(( attempt + 1 ))
                  ;;
                *)
                  echo "${result}"
                  return 1
                  ;;
              esac
            done
          }

          # ── Helper: classify a with_retry result into the caller's counters.
          #    Keeps the case/echo/counter-bump logic in one place instead of
          #    duplicating it at every call site (main loop and explicit block).
          #    $3/$4/$5 are the names of the deleted/skipped/errors counter
          #    variables to bump (different in the main loop vs explicit block).
          _apply_delete_result() {
            local result="$1" label="$2" deleted_var="$3" skipped_var="$4" errors_var="$5"
            case "${result}" in
              deleted)
                printf -v "${deleted_var}" '%s' "$(( ${!deleted_var} + 1 ))"
                ;;
              skipped)
                echo "    ℹ️  ${label} already gone — skipping." >&2
                printf -v "${skipped_var}" '%s' "$(( ${!skipped_var} + 1 ))"
                ;;
              error:*)
                echo "    ⚠️  Delete failed for ${label}: ${result#error:}" >&2
                printf -v "${errors_var}" '%s' "$(( ${!errors_var} + 1 ))"
                ;;
            esac
          }

          # ── Build auth header ─────────────────────────────────────────────────
          # OAuth Application tokens use Bearer authentication.
          # NEVER use `set -x` — it would write the token to the runner log.
          AUTH_HEADER="Authorization: Bearer ${QUAY_OAUTH_TOKEN}"

          QUAY_REPO="${QUAY_NAMESPACE}/${IMAGE_REPO}"
          QUAY_API="https://quay.io/api/v1/repository/${QUAY_REPO}"

          # ── Verify token has admin access to the repository ───────────────────
          # GET /api/v1/repository/{org}/{repo} response body:
          #
          #   Unauthenticated (public repo):
          #     { "is_public": true }          — "can_admin" absent → default false
          #   Authenticated, wrong scope:
          #     { "can_admin": false, ... }    — present but false → cannot delete tags
          #   Authenticated, "Administer Repositories" scope:
          #     { "can_admin": true, ... }     — required for tag deletion
          #   Repository not found:
          #     HTTP 404
          #
          # This replaces the previous /api/v1/user/ check, which incorrectly
          # returned 401 for Organisation OAuth Application tokens.  /api/v1/user/
          # is scoped to personal accounts; org-scoped tokens are rejected there.
          REPO_RESP=$(curl -s -w "\n%{http_code}" \
            -H "${AUTH_HEADER}" \
            "${QUAY_API}")
          REPO_HTTP=$(printf '%s' "${REPO_RESP}" | tail -1)
          REPO_BODY=$(printf '%s' "${REPO_RESP}" | head -n -1)

          case "${REPO_HTTP}" in
            2*)
              CAN_ADMIN=$(printf '%s' "${REPO_BODY}" | \
                jq -r '.can_admin // false' 2>/dev/null || echo "false")
              if [[ "${CAN_ADMIN}" == "true" ]]; then
                echo "✅ Token has admin access to quay.io/${QUAY_REPO}."
              else
                echo "❌ Token lacks 'Administer Repositories' scope (can_admin=${CAN_ADMIN})." >&2
                echo "   Re-generate the token and tick ☑ 'Administer Repositories'." >&2
                echo "   https://quay.io/organization/${QUAY_NAMESPACE}?tab=OAuthApplications" >&2
                exit 1
              fi
              ;;
            401)
              echo "❌ Quay OAuth token rejected (HTTP 401)." >&2
              echo "   The token may be expired, revoked, or not fully authorised." >&2
              echo "   Re-generate at: https://quay.io/organization/${QUAY_NAMESPACE}?tab=OAuthApplications" >&2
              exit 1
              ;;
            404)
              echo "❌ Repository quay.io/${QUAY_REPO} not found (HTTP 404)." >&2
              echo "   Verify QUAY_NAMESPACE='${QUAY_NAMESPACE}' and IMAGE_REPO='${IMAGE_REPO}'." >&2
              exit 1
              ;;
            *)
              echo "❌ Repository check returned unexpected HTTP ${REPO_HTTP}." >&2
              echo "   Body: $(printf '%s' "${REPO_BODY}" | head -c 300)" >&2
              exit 1
              ;;
          esac

          # ── Paginate through all active tags ──────────────────────────────────
          # Quay.io tag list API:
          #   GET /api/v1/repository/{repo}/tag/
          #       ?limit=100&page={N}&onlyActiveTags=true
          # Response:
          #   { "tags": [ { "name": str,
          #                 "last_modified": "Tue, 06 May 2026 00:02:00 -0000",
          #                 ... } ],
          #     "has_additional": bool }
          # Increment 'page' while has_additional == true.
          DELETED=0
          KEPT=0
          IGNORED=0
          SKIPPED=0
          ERRORS=0
          QPAGE=1

          if [[ "${PURGE}" == 'true' ]]; then
            echo "🔥 PURGE MODE — deleting ALL tags regardless of age/ignore patterns."
            echo "   Survivors limited to PURGE_KEEP_PATTERNS: '${PURGE_KEEP_PATTERNS:-<none — TOTAL WIPE>}'"
          fi

          while true; do
            RESPONSE=$(curl -fsSL \
              -H "${AUTH_HEADER}" \
              "${QUAY_API}/tag/?limit=100&page=${QPAGE}&onlyActiveTags=true")

            # Validate response shape.
            if ! echo "${RESPONSE}" | jq -e '(.tags | type) == "array"' > /dev/null 2>&1; then
              echo "❌ Unexpected Quay API response (page ${QPAGE}):" >&2
              echo "${RESPONSE}" | head -c 500 >&2
              exit 1
            fi

            TAG_COUNT=$(echo "${RESPONSE}" | jq '.tags | length')
            if (( TAG_COUNT == 0 )); then
              break  # last page reached
            fi

            while IFS= read -r TAG_JSON; do
              TAG_NAME=$(echo "${TAG_JSON}" | jq -r '.name // empty')
              [[ -z "${TAG_NAME}" ]] && continue

              # last_modified is RFC 2822, e.g. "Tue, 06 May 2026 00:02:00 -0000"
              TAG_MODIFIED=$(echo "${TAG_JSON}" | jq -r '.last_modified // empty')

              # ── PURGE MODE: bypass age + ignore patterns entirely ──────────
              if [[ "${PURGE}" == 'true' ]]; then
                if purge_is_kept "${TAG_NAME}"; then
                  echo "  🔒 PURGE-KEEP   ${TAG_NAME}  (matches purge keep pattern)"
                  IGNORED=$(( IGNORED + 1 ))
                  continue
                fi
                echo "  🔥 PURGE-DELETE ${TAG_NAME}  (modified ${TAG_MODIFIED:-unknown})"
                _apply_delete_result "$(with_retry quay_delete_tag "${TAG_NAME}")" \
                  "${TAG_NAME}" DELETED SKIPPED ERRORS
                continue
              fi

              # Ignore-list check takes priority over date check.
              if tag_is_ignored "${TAG_NAME}"; then
                echo "  🔒 IGNORE  ${TAG_NAME}  (matches ignore pattern)"
                IGNORED=$(( IGNORED + 1 ))
                continue
              fi

              # Missing timestamp → keep (safe default — never delete unknowns).
              if [[ -z "${TAG_MODIFIED}" ]]; then
                echo "  ✅ KEEP    ${TAG_NAME}  (no timestamp — kept by default)"
                KEPT=$(( KEPT + 1 ))
                continue
              fi

              # Unparsable RFC 2822 timestamp → keep (safe default).
              TAG_EPOCH=$(date -u -d "${TAG_MODIFIED}" +%s 2>/dev/null || true)
              if [[ -z "${TAG_EPOCH}" || ! "${TAG_EPOCH}" =~ ^[0-9]+$ ]]; then
                echo "  ✅ KEEP    ${TAG_NAME}  (unparsable timestamp '${TAG_MODIFIED}' — kept by default)"
                KEPT=$(( KEPT + 1 ))
                continue
              fi

              # Date check: keep if at or after cutoff.
              if (( TAG_EPOCH >= CUTOFF_EPOCH )); then
                echo "  ✅ KEEP    ${TAG_NAME}  (modified ${TAG_MODIFIED})"
                KEPT=$(( KEPT + 1 ))
                continue
              fi

              # Deletion candidate.
              echo "  🗑️  DELETE  ${TAG_NAME}  (modified ${TAG_MODIFIED}, before cutoff ${CUTOFF_DATE})"
              _apply_delete_result "$(with_retry quay_delete_tag "${TAG_NAME}")" \
                "${TAG_NAME}" DELETED SKIPPED ERRORS
            done < <(echo "${RESPONSE}" | jq -c '.tags[]')

            # has_additional (bool) signals more pages exist.
            HAS_MORE=$(echo "${RESPONSE}" | jq -r '.has_additional // false')
            [[ "${HAS_MORE}" == 'true' ]] || break
            QPAGE=$(( QPAGE + 1 ))
          done

          # ── Explicit tag deletion ─────────────────────────────────────────────
          # Quay exposes a per-tag DELETE endpoint; no manifest lookup needed
          # (unlike GHCR which requires finding the version ID first).
          # Idempotent: HTTP 400/404 → skip silently.
          if [[ -n "${EXPLICIT_TAGS:-}" ]]; then
            echo ""
            echo "🎯  Explicit tag cleanup (Quay):"
            EXPLICIT_DELETED=0
            EXPLICIT_SKIPPED=0
            EXPLICIT_ERRORS=0
            OLD_IFS="${IFS}"
            IFS=',' read -ra ETAG_LIST <<< "${EXPLICIT_TAGS}"
            IFS="${OLD_IFS}"
            for etag in "${ETAG_LIST[@]}"; do
              etag="${etag#"${etag%%[![:space:]]*}"}"  # trim leading whitespace
              etag="${etag%"${etag##*[![:space:]]}"}"  # trim trailing whitespace
              [[ -z "${etag}" ]] && continue
              # Single unconditional label — quay_delete_tag no-ops on
              # DRY_RUN=true (returns "deleted" without calling the API), so
              # one call path covers both modes. The dry-run distinction is
              # surfaced exactly once via the DRY_LABEL suffix in the summary.
              echo "  🗑️  DELETE (explicit)  ${etag}"
              _apply_delete_result "$(with_retry quay_delete_tag "${etag}")" \
                "${etag}" EXPLICIT_DELETED EXPLICIT_SKIPPED EXPLICIT_ERRORS
            done
            echo "   Explicit: deleted=${EXPLICIT_DELETED}  skipped=${EXPLICIT_SKIPPED}  errors=${EXPLICIT_ERRORS}"
            SKIPPED=$(( SKIPPED + EXPLICIT_SKIPPED ))
            ERRORS=$(( ERRORS + EXPLICIT_ERRORS ))
          fi

          # ── Step summary ──────────────────────────────────────────────────
          DRY_LABEL=""
          [[ "${DRY_RUN}" == 'true' ]] && DRY_LABEL=" (dry-run)"
          echo ""
          echo "📊 Quay cleanup complete:"
          echo "   Would delete / Deleted : ${DELETED}${DRY_LABEL}"
          echo "   Kept    : ${KEPT}"
          echo "   Ignored : ${IGNORED}"
          echo "   Skipped : ${SKIPPED}  (already gone — idempotent no-ops, not errors)"
          echo "   Errors  : ${ERRORS}"

          # (MEDIUM-2) Export per-registry counts as step outputs so the final
          # job-summary step can render them without re-parsing this step's log.
          {
            echo "deleted=${DELETED}"
            echo "kept=${KEPT}"
            echo "ignored=${IGNORED}"
            echo "skipped=${SKIPPED}"
            echo "errors=${ERRORS}"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${ERRORS}" -gt 0 ]]; then
            exit 1
          fi


      # ════════════════════════════════════════════════════════════════════════
      # Job summary (always runs — captures outcomes even on step failures)
      # ════════════════════════════════════════════════════════════════════════
      # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands#adding-a-job-summary
      - name: 📊 Registry cleanup — job summary
        if: always()
        shell: bash
        env:
          # Map step outcomes and resolved parameters to env vars here.
          DOCKER_HUB: ${{ steps.cleanup_dockerhub.outcome }}
          GHCR_HUB: ${{ steps.cleanup_ghcr.outcome }}
          QUAY_HUB: ${{ steps.cleanup_quay.outcome }}
          # DRY_RUN/PURGE/RUN_CLEANUP come from the resolve step (job env no
          # longer defines DRY_RUN — the resolver is the single source of truth).
          DRY_RUN:     ${{ steps.resolve.outputs.dry_run }}
          PURGE:       ${{ steps.resolve.outputs.purge }}
          RUN_CLEANUP: ${{ steps.resolve.outputs.run_cleanup }}
        run: |
          {
            echo "## 🧹 Docker Registry Cleanup"
            echo ""
            if [[ "${RUN_CLEANUP}" != 'true' ]]; then
              echo "> ⏭️  **No-op run** — the last-day-of-month purge cron fired on a"
              echo "> non-last day, so no cleanup was performed."
              echo ""
            fi
            echo "### Step outcomes"
            echo ""
            echo "| Registry        | Outcome |"
            echo "|-----------------|---------|"
            echo "| Docker Hub      | \`${DOCKER_HUB:-skipped}\` |"
            echo "| GitHub GHCR     | \`${GHCR_HUB:-skipped}\`   |"
            echo "| RedHat Quay     | \`${QUAY_HUB:-skipped}\`   |"
            echo ""
            echo "### Run parameters"
            echo ""
            echo "| Parameter         | Value |"
            echo "|-------------------|-------|"
            echo "| Target            | \`${CLEANUP_TARGET}\`       |"
            echo "| Keep days         | \`${KEEP_DAYS}\`            |"
            echo "| Dry run           | \`${DRY_RUN:-?}\`           |"
            echo "| Purge             | \`${PURGE:-?}\`             |"
            echo "| Ignore patterns   | \`${IGNORE_PATTERNS}\`      |"
            echo "| Purge keep        | \`${PURGE_KEEP_PATTERNS:-<none — total wipe>}\` |"
            echo "| Explicit tags     | \`${EXPLICIT_TAGS:-<none>}\` |"
            echo ""
            if [[ "${PURGE}" == 'true' ]]; then
              echo "> 🔥 **PURGE MODE** — age and ignore-pattern filters were bypassed."
              echo "> Only tags matching \`${PURGE_KEEP_PATTERNS:-<none>}\` were preserved."
              echo ">"
            fi
            if [[ "${DRY_RUN}" == 'true' ]]; then
              echo "> ℹ️  **Dry-run mode** — no tags were deleted."
              echo "> Set \`cleanup_dry_run\` to \`false\` to execute deletions."
            else
              echo "> ⚠️  **Live mode** — deletions were executed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
