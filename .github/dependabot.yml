# .github/dependabot.yml
# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# ┌─ IMPORTANT: pypa/cibuildwheel is intentionally multi-pinned ────────────────┐
# │                                                                             │
# │  ci_wheels_conda.yml uses a deliberate two-version split:                   │
# │                                                                             │
# │   v3.4.1  (sha: 8d2b08b…)  cp38, cp313t                                     │
# │            cibuildwheel 4.x dropped Python <3.9 AND cp313t entirely.        │
# │            These builds MUST stay on 3.x; there is no 4.x equivalent.       │
# │                                                                             │
# │   v4.1.0  (sha: 2947353…)  cp39, cp310, cp311, cp312, cp313, cp314, cp314t  │
# │            First 4.x release to support cp314t without the freethreading    │
# │            enable flag; newer patch/minor bumps need explicit testing.      │
# │                                                                             │
# │  Any version bump — even a patch bump — to either pin can silently break    │
# │  the split: a new 3.x might drop cp38, a new 4.x might drop cp314t, etc.    │
# │  DO NOT allow Dependabot to auto-update pypa/cibuildwheel.                  │
# │  Update both pins together, manually, after reading the cibuildwheel        │
# │  release notes and re-verifying the Python version support matrix.          │
# └─────────────────────────────────────────────────────────────────────────────┘

version: 2

updates:
  # Maintain dependencies for GitHub Actions as recommended in SPEC8:
  # https://github.com/scientific-python/specs/pull/325
  # At the time of writing, release critical workflows such as
  # pypa/gh-action-pypi-publish should use hash-based versioning for security
  # reasons. This strategy may be generalized to all other github actions
  # in the future.
  # ── GitHub Actions ────────────────────────────────────────────────────────
  # https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference#package-ecosystem-
  - package-ecosystem: github-actions # See documentation for possible values
    # Dependabot checks every workflow file under .github/workflows/
    directory: "/"    # ".github/workflows" Location of package manifests
    schedule:
      interval: weekly  # "daily", weekly, monthly
      # day: "monday"
      # time: '11:11'
      # timezone: "UTC"
    # https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/secure-your-dependencies/configure-version-updates#disabling-dependabot-version-updates
    ignore:
      # Ignore updates to packages that start with 'aws'
      # Wildcards match zero or more arbitrary characters
      # Ignore some updates to the 'express' package
      # .github/workflows/ci_wheels_conda.yml:324:
      - dependency-name: "bus1/cabuild"
      # ── pypa/cibuildwheel: NEVER auto-update ──────────────────────────────
      # Reason: ci_wheels_conda.yml carries two intentionally different pins:
      #
      #   Pin 1 → v3.4.1  used for cp38 and cp313t
      #     cibuildwheel 4.x removed Python <3.9 support and cp313t support.
      #     v3.4.1 is the last 3.x release that covers both; any 3.x→4.x bump
      #     would immediately break every cp38 and cp313t matrix cell.
      #
      #   Pin 2 → v4.1.0  used for cp39 through cp314t
      #     v4.1.0 is the first release where cp314t works without an explicit
      #     cpython-freethreading enable flag.  A future patch might change the
      #     build selector format or drop another Python version without notice.
      #
      # Both pins must be updated together, manually, after reading the upstream
      # changelog at https://github.com/pypa/cibuildwheel/releases and verifying
      # the full Python version support matrix remains intact.
      - dependency-name: "pypa/cibuildwheel"
        versions:
          # - "*"  # block every version, including patch and minor bumps
          - ">=4.0.0"  # would affect all uses of cibuildwheel, including the workflow already on 4.x.
    commit-message:
      prefix: "[MAINT]"
    labels:
      - "03 - Maintenance"
      - "build/ci"
      - "dependencies"
      - "dev-automation"
      - "github_actions"
      - "maintenance"
      - no-changelog-entry-needed
    # Group all non-ignored action bumps into a single PR to reduce noise.
    groups:
      # github-actions-all:
      actions:
        patterns:
          - "*"
    # cooldown:
    #   default-days: 7  # optional
    # reviewers:
    #   - "scikit-plots/core-devs"

  - package-ecosystem: pip
    directory: /  # /requirements
    exclude-paths:
      # "supported-versions": "3.10.*, 3.11.*, 3.12.*, 3.13.*, 3.14.*"
      - docker/env_pipenv/py38/**
      - docker/env_pipenv/py39/**
    schedule:
      interval: weekly  # "daily", weekly, monthly
      # day: "monday"
      # time: '11:11'
      # timezone: "UTC"
    ignore:
      - dependency-name: "scipy-openblas32"
      - dependency-name: "scipy-openblas64"
      - dependency-name: "jupyterlite-pyodide-kernel"
      - dependency-name: "sphinx"
      - dependency-name: "h5py"
    commit-message:
      prefix: "[MAINT]"
    labels:
      - "03 - Maintenance"
      - "build/ci"
      - "dependencies"
      - "maintenance"
      - no-changelog-entry-needed
    # Group all non-ignored action bumps into a single PR to reduce noise.
    groups:
      python-deps:
        applies-to: "version-updates"
        patterns:
          - "*"  # catches EVERY dependency in ALL requirements files
    # cooldown:
    #   default-days: 7  # optional
    # reviewers:
    #   - "scikit-plots/core-devs"

  - package-ecosystem: "conda"
    directory: "/"
    schedule:
      interval: weekly  # "daily", weekly, monthly

  # pipenv	pip	<= 2024.4.1
  # - package-ecosystem: "pipenv"
